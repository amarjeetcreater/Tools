<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Formatter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">JSON Formatter</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">JSON Formatter Functionality</h5>
                <div class="mb-3">
                    <label for="jsonInput" class="form-label">Enter JSON:</label>
                    <textarea class="form-control" id="jsonInput" rows="10" placeholder="Type or paste your JSON here..."></textarea>
                </div>
                <button class="btn btn-primary mt-3" id="formatBtn">Format JSON</button>
                <div class="mt-3">
                    <label for="jsonOutput" class="form-label">Formatted JSON:</label>
                    <textarea class="form-control" id="jsonOutput" rows="10" readonly></textarea>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const jsonInput = document.getElementById('jsonInput');
            const jsonOutput = document.getElementById('jsonOutput');
            const formatBtn = document.getElementById('formatBtn');

            formatBtn.addEventListener('click', () => {
                try {
                    const json = JSON.parse(jsonInput.value);
                    jsonOutput.value = JSON.stringify(json, null, 4);
                } catch (e) {
                    alert('Invalid JSON: ' + e.message);
                    jsonOutput.value = '';
                }
            });

            // Optional: Format on input change
            jsonInput.addEventListener('input', () => {
                try {
                    const json = JSON.parse(jsonInput.value);
                    jsonOutput.value = JSON.stringify(json, null, 4);
                } catch (e) {
                    jsonOutput.value = ''; // Clear output if invalid JSON
                }
            });
        });
    </script>
</body>
</html>

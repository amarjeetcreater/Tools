<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speech-to-Text</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">Speech-to-Text</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Speech-to-Text Functionality</h5>
                <div class="mb-3">
                    <button id="startBtn" class="btn btn-primary me-2">Start Listening</button>
                    <button id="stopBtn" class="btn btn-danger" disabled>Stop</button>
                </div>
                <div class="form-group">
                    <label for="resultText">Transcription:</label>
                    <textarea id="resultText" class="form-control" rows="5" readonly></textarea>
                </div>
                <div id="status" class="mt-2 text-muted">Press "Start Listening" to begin</div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        // JavaScript for Speech-to-Text tool
        document.addEventListener('DOMContentLoaded', function() {
            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');
            const resultText = document.getElementById('resultText');
            const status = document.getElementById('status');
            
            let recognition;
            
            if ('webkitSpeechRecognition' in window) {
                recognition = new webkitSpeechRecognition();
                recognition.continuous = true;
                recognition.interimResults = true;
                
                recognition.onstart = function() {
                    status.textContent = 'Listening...';
                    startBtn.disabled = true;
                    stopBtn.disabled = false;
                };
                
                recognition.onresult = function(event) {
                    let interimTranscript = '';
                    let finalTranscript = '';
                    
                    for (let i = event.resultIndex; i < event.results.length; i++) {
                        const transcript = event.results[i][0].transcript;
                        if (event.results[i].isFinal) {
                            finalTranscript += transcript;
                        } else {
                            interimTranscript += transcript;
                        }
                    }
                    
                    resultText.value = finalTranscript + interimTranscript;
                };
                
                recognition.onerror = function(event) {
                    status.textContent = 'Error occurred: ' + event.error;
                    stopRecognition();
                };
                
                recognition.onend = function() {
                    if (!stopBtn.disabled) {
                        status.textContent = 'Microphone disconnected';
                        stopRecognition();
                    }
                };
                
                startBtn.addEventListener('click', function() {
                    resultText.value = '';
                    recognition.start();
                });
                
                stopBtn.addEventListener('click', stopRecognition);
                
                function stopRecognition() {
                    recognition.stop();
                    startBtn.disabled = false;
                    stopBtn.disabled = true;
                    status.textContent = 'Press "Start Listening" to begin';
                }
            } else {
                status.textContent = 'Speech recognition not supported in this browser';
                startBtn.disabled = true;
            }
        });
    </script>
</body>
</html>

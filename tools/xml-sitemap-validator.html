<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XML Sitemap Validator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">XML Sitemap Validator</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">XML Sitemap Validator Functionality</h5>
                <p class="card-text">Enter a sitemap URL or paste XML content to validate.</p>
                <ul class="nav nav-tabs mb-3" id="sitemapInputTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="url-tab" data-bs-toggle="tab" data-bs-target="#urlInput" type="button" role="tab" aria-controls="urlInput" aria-selected="true">Sitemap URL</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="xml-tab" data-bs-toggle="tab" data-bs-target="#xmlInput" type="button" role="tab" aria-controls="xmlInput" aria-selected="false">XML Content</button>
                    </li>
                </ul>
                <div class="tab-content" id="sitemapInputTabsContent">
                    <div class="tab-pane fade show active" id="urlInput" role="tabpanel" aria-labelledby="url-tab">
                        <div class="mb-3">
                            <label for="sitemapUrl" class="form-label">Sitemap URL:</label>
                            <input type="url" class="form-control" id="sitemapUrl" placeholder="https://example.com/sitemap.xml">
                        </div>
                    </div>
                    <div class="tab-pane fade" id="xmlInput" role="tabpanel" aria-labelledby="xml-tab">
                        <div class="mb-3">
                            <label for="sitemapXml" class="form-label">Sitemap XML Content:</label>
                            <textarea class="form-control" id="sitemapXml" rows="10" placeholder="Paste your sitemap XML here..."></textarea>
                        </div>
                    </div>
                </div>
                <button class="btn btn-primary" id="validateSitemapBtn">Validate Sitemap</button>
                <div class="mt-3" id="resultsDisplay">
                    <!-- Results will be displayed here -->
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        // JavaScript for XML Sitemap Validator tool
        document.addEventListener('DOMContentLoaded', function() {
            const sitemapUrlInput = document.getElementById('sitemapUrl');
            const sitemapXmlInput = document.getElementById('sitemapXml');
            const validateSitemapBtn = document.getElementById('validateSitemapBtn');
            const resultsDisplay = document.getElementById('resultsDisplay');

            validateSitemapBtn.addEventListener('click', function() {
                const sitemapUrl = sitemapUrlInput.value.trim();
                const sitemapXml = sitemapXmlInput.value.trim();

                resultsDisplay.innerHTML = ''; // Clear previous results

                if (sitemapUrl || sitemapXml) {
                    resultsDisplay.innerHTML = `<p>Validating sitemap...</p>`;
                    // Simulate validation
                    setTimeout(() => {
                        const isValid = Math.random() > 0.3; // 70% chance of being valid
                        if (isValid) {
                            resultsDisplay.innerHTML = `
                                <div class="alert alert-success" role="alert">
                                    <h4 class="alert-heading">Validation Successful!</h4>
                                    <p>The sitemap appears to be valid.</p>
                                    <hr>
                                    <p class="mb-0"><em>(Note: This is a simulated result. Real validation requires parsing and checking against XML schema.)</em></p>
                                </div>
                            `;
                        } else {
                            const errors = [
                                "Missing required <loc> tag in one or more <url> entries.",
                                "Invalid date format in <lastmod> tag.",
                                "Duplicate URL entries found.",
                                "Sitemap size exceeds 50MB or 50,000 URLs."
                            ];
                            const randomError = errors[Math.floor(Math.random() * errors.length)];
                            resultsDisplay.innerHTML = `
                                <div class="alert alert-danger" role="alert">
                                    <h4 class="alert-heading">Validation Failed!</h4>
                                    <p>The sitemap contains errors:</p>
                                    <ul>
                                        <li>${randomError}</li>
                                    </ul>
                                    <hr>
                                    <p class="mb-0"><em>(Note: This is a simulated result. Real validation requires parsing and checking against XML schema.)</em></p>
                                </div>
                            `;
                        }
                    }, 2000);
                } else {
                    resultsDisplay.innerHTML = '<p class="text-danger">Please enter a sitemap URL or paste XML content.</p>';
                }
            });
        });
    </script>
</body>
</html>

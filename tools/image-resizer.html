<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Resizer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">Image Resizer</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Image Resizer Functionality</h5>
                <input type="file" class="form-control" id="imageUpload" accept="image/*">
                <div class="mt-3">
                    <label for="widthInput" class="form-label">Width:</label>
                    <input type="number" class="form-control" id="widthInput" placeholder="Enter width">
                </div>
                <div class="mt-3">
                    <label for="heightInput" class="form-label">Height:</label>
                    <input type="number" class="form-control" id="heightInput" placeholder="Enter height">
                </div>
                <button class="btn btn-primary mt-3" id="resizeBtn">Resize Image</button>
                <div class="mt-3" id="downloadLink" style="display:none;">
                    <a href="#" id="downloadAnchor" download="resized-image.png" class="btn btn-success">Download Resized Image</a>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const imageUpload = document.getElementById('imageUpload');
            const widthInput = document.getElementById('widthInput');
            const heightInput = document.getElementById('heightInput');
            const resizeBtn = document.getElementById('resizeBtn');
            const downloadLink = document.getElementById('downloadLink');
            const downloadAnchor = document.getElementById('downloadAnchor');

            resizeBtn.addEventListener('click', function() {
                const file = imageUpload.files[0];
                const width = parseInt(widthInput.value);
                const height = parseInt(heightInput.value);

                if (!file) {
                    alert('Please select an image.');
                    return;
                }
                if (isNaN(width) || isNaN(height) || width <= 0 || height <= 0) {
                    alert('Please enter valid width and height.');
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        canvas.toBlob(function(blob) {
                            const url = URL.createObjectURL(blob);
                            downloadAnchor.href = url;
                            downloadLink.style.display = 'block';
                        }, 'image/png'); // You can change format if needed
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        });
    </script>
</body>
</html>

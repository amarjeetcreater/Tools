<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meme Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">Meme Generator</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Meme Generator Functionality</h5>
                <p class="card-text">Upload an image and add your captions to create a meme.</p>
                <div class="mb-3">
                    <label for="imageUpload" class="form-label">Upload Image</label>
                    <input class="form-control" type="file" id="imageUpload" accept="image/*">
                </div>
                <div class="mb-3">
                    <label for="topText" class="form-label">Top Text</label>
                    <input type="text" class="form-control" id="topText" placeholder="Enter top caption">
                </div>
                <div class="mb-3">
                    <label for="bottomText" class="form-label">Bottom Text</label>
                    <input type="text" class="form-control" id="bottomText" placeholder="Enter bottom caption">
                </div>
                <div class="d-grid gap-2 mb-3">
                    <button class="btn btn-primary" id="generateMemeBtn">Generate Meme</button>
                    <button class="btn btn-secondary" id="clearBtn">Clear</button>
                </div>
                <div id="memeResult" class="mt-4 text-center">
                    <h5>Generated Meme:</h5>
                    <canvas id="memeCanvas" class="img-fluid rounded shadow-sm"></canvas>
                    <div class="mt-3">
                        <button class="btn btn-success" id="downloadMemeBtn" style="display: none;">Download Meme</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        // JavaScript for Meme Generator tool
        document.addEventListener('DOMContentLoaded', function() {
            const imageUpload = document.getElementById('imageUpload');
            const topTextInput = document.getElementById('topText');
            const bottomTextInput = document.getElementById('bottomText');
            const generateMemeBtn = document.getElementById('generateMemeBtn');
            const clearBtn = document.getElementById('clearBtn');
            const memeCanvas = document.getElementById('memeCanvas');
            const downloadMemeBtn = document.getElementById('downloadMemeBtn');
            const ctx = memeCanvas.getContext('2d');

            let uploadedImage = null;

            imageUpload.addEventListener('change', handleImageUpload);
            generateMemeBtn.addEventListener('click', generateMeme);
            clearBtn.addEventListener('click', clearFields);
            downloadMemeBtn.addEventListener('click', downloadMeme);

            function handleImageUpload(event) {
                const file = event.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const img = new Image();
                        img.onload = function() {
                            uploadedImage = img;
                            drawMeme();
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            }

            function drawMeme() {
                if (!uploadedImage) return;

                memeCanvas.width = uploadedImage.width;
                memeCanvas.height = uploadedImage.height;

                ctx.clearRect(0, 0, memeCanvas.width, memeCanvas.height);
                ctx.drawImage(uploadedImage, 0, 0, memeCanvas.width, memeCanvas.height);

                ctx.font = 'bold ' + (memeCanvas.width / 10) + 'px Impact';
                ctx.fillStyle = 'white';
                ctx.strokeStyle = 'black';
                ctx.lineWidth = memeCanvas.width / 100;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';

                const topText = topTextInput.value.toUpperCase();
                const bottomText = bottomTextInput.value.toUpperCase();

                if (topText) {
                    ctx.fillText(topText, memeCanvas.width / 2, memeCanvas.height * 0.05);
                    ctx.strokeText(topText, memeCanvas.width / 2, memeCanvas.height * 0.05);
                }

                ctx.textBaseline = 'bottom';
                if (bottomText) {
                    ctx.fillText(bottomText, memeCanvas.width / 2, memeCanvas.height * 0.95);
                    ctx.strokeText(bottomText, memeCanvas.width / 2, memeCanvas.height * 0.95);
                }

                downloadMemeBtn.style.display = 'block';
            }

            function generateMeme() {
                if (!uploadedImage) {
                    alert('Please upload an image first.');
                    return;
                }
                drawMeme();
            }

            function downloadMeme() {
                const dataURL = memeCanvas.toDataURL('image/png');
                const a = document.createElement('a');
                a.href = dataURL;
                a.download = 'meme.png';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }

            function clearFields() {
                imageUpload.value = '';
                topTextInput.value = '';
                bottomTextInput.value = '';
                uploadedImage = null;
                ctx.clearRect(0, 0, memeCanvas.width, memeCanvas.height);
                downloadMemeBtn.style.display = 'none';
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitter Video Downloader</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">Twitter Video Downloader</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Twitter Video Downloader Functionality</h5>
                <p class="card-text">This is a placeholder for the Twitter Video Downloader tool. Its functionality will be implemented here.</p>
                <div class="mb-3">
                    <label for="tweetUrl" class="form-label">Enter Twitter Video URL</label>
                    <input type="url" class="form-control" id="tweetUrl" placeholder="https://twitter.com/user/status/1234567890">
                </div>
                <div class="d-grid gap-2 mb-3">
                    <button class="btn btn-primary" id="getVideoBtn">Get Video</button>
                    <button class="btn btn-secondary" id="clearBtn">Clear</button>
                </div>
                <div id="videoResult" class="mt-4 text-center">
                    <h5>Downloaded Video:</h5>
                    <div id="videoDisplay" class="mb-3">
                        <!-- Video will be displayed here -->
                    </div>
                    <div id="downloadOptions" style="display: none;">
                        <a id="downloadLink" href="#" class="btn btn-success" download>Download Video</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        // JavaScript for Twitter Video Downloader tool
        document.addEventListener('DOMContentLoaded', function() {
            const tweetUrlInput = document.getElementById('tweetUrl');
            const getVideoBtn = document.getElementById('getVideoBtn');
            const clearBtn = document.getElementById('clearBtn');
            const videoDisplay = document.getElementById('videoDisplay');
            const downloadOptions = document.getElementById('downloadOptions');
            const downloadLink = document.getElementById('downloadLink');

            getVideoBtn.addEventListener('click', getTwitterVideo);
            clearBtn.addEventListener('click', clearFields);

            async function getTwitterVideo() {
                const url = tweetUrlInput.value.trim();
                if (!url) {
                    videoDisplay.innerHTML = '<p class="text-danger">Please enter a Twitter video URL.</p>';
                    downloadOptions.style.display = 'none';
                    return;
                }

                videoDisplay.innerHTML = '<p>Loading...</p>';
                downloadOptions.style.display = 'none';

                try {
                    // Using a proxy to bypass CORS issues for fetching Twitter video data
                    // Note: This API might not always be reliable or may require an API key for consistent use.
                    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://twitsave.com/api/tweet?url=${url}`)}`;
                    const response = await fetch(proxyUrl);
                    const data = await response.json();

                    if (data && data.videos && data.videos.length > 0) {
                        // Find the highest quality video
                        const highestQualityVideo = data.videos.reduce((prev, current) => {
                            return (prev.quality > current.quality) ? prev : current;
                        });

                        const videoUrl = highestQualityVideo.url;
                        videoDisplay.innerHTML = `
                            <video controls class="img-fluid rounded shadow-sm mb-3">
                                <source src="${videoUrl}" type="video/mp4">
                                Your browser does not support the video tag.
                            </video>
                        `;
                        downloadLink.href = videoUrl;
                        downloadOptions.style.display = 'block';
                    } else {
                        videoDisplay.innerHTML = '<p class="text-danger">Could not find video. Invalid URL or private tweet.</p>';
                    }

                } catch (error) {
                    console.error('Error fetching Twitter video:', error);
                    videoDisplay.innerHTML = '<p class="text-danger">Error fetching video. Please check the URL or try again later.</p>';
                }
            }

            function clearFields() {
                tweetUrlInput.value = '';
                videoDisplay.innerHTML = '';
                downloadOptions.style.display = 'none';
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">BMI Calculator</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">BMI Calculator Functionality</h5>
                <div class="mb-3">
                    <label for="weightInput" class="form-label">Weight (kg):</label>
                    <input type="number" class="form-control" id="weightInput" placeholder="Enter weight in kilograms">
                </div>
                <div class="mb-3">
                    <label for="heightInput" class="form-label">Height (cm):</label>
                    <input type="number" class="form-control" id="heightInput" placeholder="Enter height in centimeters">
                </div>
                <button class="btn btn-primary mt-3" id="calculateBtn">Calculate BMI</button>
                <div class="mt-3">
                    <p>Your BMI is: <span id="bmiOutput" class="fw-bold"></span></p>
                    <p>Category: <span id="categoryOutput" class="fw-bold"></span></p>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const weightInput = document.getElementById('weightInput');
            const heightInput = document.getElementById('heightInput');
            const calculateBtn = document.getElementById('calculateBtn');
            const bmiOutput = document.getElementById('bmiOutput');
            const categoryOutput = document.getElementById('categoryOutput');

            calculateBtn.addEventListener('click', function() {
                const weight = parseFloat(weightInput.value);
                const height = parseFloat(heightInput.value);

                if (isNaN(weight) || isNaN(height) || weight <= 0 || height <= 0) {
                    alert('Please enter valid weight and height.');
                    return;
                }

                const heightInMeters = height / 100; // Convert cm to meters
                const bmi = weight / (heightInMeters * heightInMeters);
                bmiOutput.textContent = bmi.toFixed(2);

                let category = '';
                if (bmi < 18.5) {
                    category = 'Underweight';
                } else if (bmi >= 18.5 && bmi < 24.9) {
                    category = 'Normal weight';
                } else if (bmi >= 25 && bmi < 29.9) {
                    category = 'Overweight';
                } else {
                    category = 'Obesity';
                }
                categoryOutput.textContent = category;
            });
        });
    </script>
</body>
</html>

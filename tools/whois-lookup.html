<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whois Lookup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">Whois Lookup</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Whois Lookup Functionality</h5>
                <p class="card-text">This is a placeholder for the Whois Lookup tool. Its functionality will be implemented here.</p>
                <div class="mb-3">
                    <label for="domainInput" class="form-label">Enter Domain Name</label>
                    <input type="text" class="form-control" id="domainInput" placeholder="example.com">
                </div>
                <div class="d-grid gap-2 mb-3">
                    <button class="btn btn-primary" id="lookupBtn">Lookup</button>
                    <button class="btn btn-secondary" id="clearBtn">Clear</button>
                </div>
                <div id="whoisResult" class="mt-4">
                    <h5>Whois Information:</h5>
                    <pre id="resultDisplay" class="bg-light p-3 rounded" style="white-space: pre-wrap; word-wrap: break-word;">No information yet.</pre>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        // JavaScript for Whois Lookup tool
        document.addEventListener('DOMContentLoaded', function() {
            const domainInput = document.getElementById('domainInput');
            const lookupBtn = document.getElementById('lookupBtn');
            const clearBtn = document.getElementById('clearBtn');
            const resultDisplay = document.getElementById('resultDisplay');

            lookupBtn.addEventListener('click', fetchWhoisData);
            clearBtn.addEventListener('click', clearFields);

            async function fetchWhoisData() {
                const domain = domainInput.value.trim();
                if (!domain) {
                    resultDisplay.textContent = 'Please enter a domain name.';
                    return;
                }

                resultDisplay.textContent = 'Fetching Whois data...';
                try {
                    // Using a proxy to bypass CORS issues with Whois APIs
                    // Note: This is a simplified example. In a production environment,
                    // you would typically have a backend proxy to handle API requests securely.
                    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://whois.freeaiapi.xyz/?query=${domain}`)}`;
                    const response = await fetch(proxyUrl);
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    const data = await response.text();
                    resultDisplay.textContent = data || 'No Whois information found for this domain.';
                } catch (error) {
                    console.error('Error fetching Whois data:', error);
                    resultDisplay.textContent = `Error: ${error.message}. Could not fetch Whois data.`;
                }
            }

            function clearFields() {
                domainInput.value = '';
                resultDisplay.textContent = 'No information yet.';
            }
        });
    </script>
</body>
</html>

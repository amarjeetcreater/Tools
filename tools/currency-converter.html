<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">Currency Converter</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Currency Converter Functionality</h5>
                <div class="mb-3">
                    <label for="amount" class="form-label">Amount:</label>
                    <input type="number" class="form-control" id="amount" placeholder="Enter amount" value="1">
                </div>
                <div class="mb-3">
                    <label for="fromCurrency" class="form-label">From Currency:</label>
                    <select class="form-select" id="fromCurrency"></select>
                </div>
                <div class="mb-3 text-center">
                    <button class="btn btn-secondary" id="swapCurrencies"><i class="fas fa-exchange-alt"></i> Swap</button>
                </div>
                <div class="mb-3">
                    <label for="toCurrency" class="form-label">To Currency:</label>
                    <select class="form-select" id="toCurrency"></select>
                </div>
                <div class="d-grid gap-2 d-md-block mb-3">
                    <button class="btn btn-primary me-2" id="convertBtn"><i class="fas fa-sync-alt"></i> Convert</button>
                    <button class="btn btn-danger" id="clearBtn"><i class="fas fa-trash"></i> Clear</button>
                </div>
                <div class="mt-4">
                    <h5>Converted Amount:</h5>
                    <div class="input-group">
                        <input type="text" class="form-control" id="convertedAmount" readonly>
                        <button class="btn btn-info" id="copyBtn"><i class="fas fa-copy"></i> Copy</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const amountInput = document.getElementById('amount');
            const fromCurrencySelect = document.getElementById('fromCurrency');
            const toCurrencySelect = document.getElementById('toCurrency');
            const swapCurrenciesBtn = document.getElementById('swapCurrencies');
            const convertBtn = document.getElementById('convertBtn');
            const clearBtn = document.getElementById('clearBtn');
            const convertedAmountInput = document.getElementById('convertedAmount');
            const copyBtn = document.getElementById('copyBtn');

            const API_URL = 'https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies';

            async function fetchCurrencies() {
                try {
                    const response = await fetch(`${API_URL}/usd.json`);
                    const data = await response.json();
                    const currencies = Object.keys(data.usd).sort();

                    currencies.forEach(currency => {
                        const option1 = document.createElement('option');
                        option1.value = currency;
                        option1.textContent = currency.toUpperCase();
                        fromCurrencySelect.appendChild(option1);

                        const option2 = document.createElement('option');
                        option2.value = currency;
                        option2.textContent = currency.toUpperCase();
                        toCurrencySelect.appendChild(option2);
                    });

                    // Set default values
                    fromCurrencySelect.value = 'usd';
                    toCurrencySelect.value = 'inr';

                } catch (error) {
                    console.error('Error fetching currencies:', error);
                    alert('Failed to load currencies. Please try again later.');
                }
            }

            async function convertCurrency() {
                const amount = parseFloat(amountInput.value);
                const fromCurrency = fromCurrencySelect.value;
                const toCurrency = toCurrencySelect.value;

                if (isNaN(amount) || amount <= 0) {
                    convertedAmountInput.value = 'Please enter a valid amount.';
                    return;
                }

                if (fromCurrency === toCurrency) {
                    convertedAmountInput.value = amount.toFixed(2);
                    return;
                }

                try {
                    const response = await fetch(`${API_URL}/${fromCurrency}.json`);
                    const data = await response.json();
                    const rate = data[fromCurrency][toCurrency];

                    if (rate) {
                        const convertedValue = amount * rate;
                        convertedAmountInput.value = convertedValue.toFixed(2);
                    } else {
                        convertedAmountInput.value = 'Conversion rate not available.';
                    }
                } catch (error) {
                    console.error('Error converting currency:', error);
                    convertedAmountInput.value = 'Error during conversion.';
                }
            }

            swapCurrenciesBtn.addEventListener('click', () => {
                const temp = fromCurrencySelect.value;
                fromCurrencySelect.value = toCurrencySelect.value;
                toCurrencySelect.value = temp;
                convertCurrency();
            });

            convertBtn.addEventListener('click', convertCurrency);

            copyBtn.addEventListener('click', () => {
                convertedAmountInput.select();
                convertedAmountInput.setSelectionRange(0, 99999);
                document.execCommand('copy');
                alert('Copied to clipboard!');
            });

            clearBtn.addEventListener('click', () => {
                amountInput.value = '1';
                fromCurrencySelect.value = 'usd';
                toCurrencySelect.value = 'inr';
                convertedAmountInput.value = '';
            });

            fetchCurrencies();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hashtag Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">Hashtag Generator</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Hashtag Generator</h5>
                <div class="mb-3">
                    <label for="textInput" class="form-label">Enter text or keywords</label>
                    <textarea class="form-control" id="textInput" rows="3" placeholder="Enter text or keywords to generate hashtags..."></textarea>
                </div>
                <button id="generateBtn" class="btn btn-primary me-2">Generate Hashtags</button>
                <button id="clearBtn" class="btn btn-secondary">Clear</button>
                
                <div id="hashtagsContainer" class="mt-4 d-none">
                    <h6>Generated Hashtags:</h6>
                    <div id="generatedHashtags" class="alert alert-info" role="alert"></div>
                    <button id="copyHashtagsBtn" class="btn btn-success mt-2">Copy Hashtags</button>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        // JavaScript for Hashtag Generator tool
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Hashtag Generator loaded.');
            // Implement tool-specific JavaScript here
            const generateBtn = document.getElementById('generateBtn');
            const clearBtn = document.getElementById('clearBtn');
            const textInput = document.getElementById('textInput');
            const hashtagsContainer = document.getElementById('hashtagsContainer');
            const generatedHashtagsDiv = document.getElementById('generatedHashtags');
            const copyHashtagsBtn = document.getElementById('copyHashtagsBtn');

            generateBtn.addEventListener('click', () => {
                const text = textInput.value.trim();
                if (!text) {
                    alert('Please enter some text or keywords to generate hashtags.');
                    return;
                }

                // Simple hashtag generation logic
                // Convert text to lowercase, remove non-alphanumeric characters, split by spaces, and add #
                const words = text.toLowerCase().split(/[^a-z0-9]+/);
                const hashtags = words.filter(word => word.length > 0).map(word => `#${word}`);

                if (hashtags.length > 0) {
                    generatedHashtagsDiv.textContent = hashtags.join(' ');
                    hashtagsContainer.classList.remove('d-none');
                } else {
                    generatedHashtagsDiv.textContent = 'No hashtags could be generated.';
                    hashtagsContainer.classList.remove('d-none');
                }
            });

            clearBtn.addEventListener('click', () => {
                textInput.value = '';
                generatedHashtagsDiv.textContent = '';
                hashtagsContainer.classList.add('d-none');
            });

            copyHashtagsBtn.addEventListener('click', () => {
                const hashtagsToCopy = generatedHashtagsDiv.textContent;
                if (hashtagsToCopy) {
                    navigator.clipboard.writeText(hashtagsToCopy).then(() => {
                        alert('Hashtags copied to clipboard!');
                    }).catch(err => {
                        console.error('Failed to copy hashtags:', err);
                        alert('Failed to copy hashtags. Please try again.');
                    });
                }
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Percentage Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">Percentage Calculator</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Percentage Calculator Functionality</h5>
                <div class="mb-3">
                    <label for="num1" class="form-label">Number 1:</label>
                    <input type="number" class="form-control" id="num1" placeholder="Enter first number">
                </div>
                <div class="mb-3">
                    <label for="num2" class="form-label">Number 2:</label>
                    <input type="number" class="form-control" id="num2" placeholder="Enter second number">
                </div>
                <div class="d-grid gap-2 d-md-block mb-3">
                    <button class="btn btn-primary me-2" id="calculateBtn"><i class="fas fa-calculator"></i> Calculate Percentage</button>
                    <button class="btn btn-danger" id="clearBtn"><i class="fas fa-trash"></i> Clear</button>
                </div>
                <div class="mt-4">
                    <h5>Result:</h5>
                    <div class="input-group">
                        <input type="text" class="form-control" id="result" readonly>
                        <button class="btn btn-info" id="copyBtn"><i class="fas fa-copy"></i> Copy</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const num1Input = document.getElementById('num1');
            const num2Input = document.getElementById('num2');
            const calculateBtn = document.getElementById('calculateBtn');
            const clearBtn = document.getElementById('clearBtn');
            const resultInput = document.getElementById('result');
            const copyBtn = document.getElementById('copyBtn');

            calculateBtn.addEventListener('click', () => {
                const num1 = parseFloat(num1Input.value);
                const num2 = parseFloat(num2Input.value);

                if (isNaN(num1) || isNaN(num2)) {
                    resultInput.value = 'Please enter valid numbers.';
                    return;
                }

                if (num2 === 0) {
                    resultInput.value = 'Cannot divide by zero.';
                    return;
                }

                const percentage = (num1 / num2) * 100;
                resultInput.value = `${percentage.toFixed(2)}%`;
            });

            copyBtn.addEventListener('click', () => {
                resultInput.select();
                resultInput.setSelectionRange(0, 99999);
                document.execCommand('copy');
                alert('Copied to clipboard!');
            });

            clearBtn.addEventListener('click', () => {
                num1Input.value = '';
                num2Input.value = '';
                resultInput.value = '';
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plagiarism Checker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">Plagiarism Checker</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Enter Text for Plagiarism Check</h5>
                <div class="mb-3">
                    <textarea class="form-control" id="textInput" rows="10" placeholder="Paste your text here..."></textarea>
                </div>
                <button id="checkPlagiarismBtn" class="btn btn-primary">Check Plagiarism</button>
                <div class="mt-3" id="results"></div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        // JavaScript for Plagiarism Checker tool
        document.addEventListener('DOMContentLoaded', function() {
            const textInput = document.getElementById('textInput');
            const checkPlagiarismBtn = document.getElementById('checkPlagiarismBtn');
            const resultsDiv = document.getElementById('results');

            checkPlagiarismBtn.addEventListener('click', function() {
                const text = textInput.value.trim();
                if (text === '') {
                    resultsDiv.innerHTML = '<div class="alert alert-warning">Please enter some text to check.</div>';
                    return;
                }

                resultsDiv.innerHTML = '<div class="alert alert-info">Checking for plagiarism...</div>';

                // Simulate plagiarism check
                setTimeout(() => {
                    const isPlagiarized = Math.random() < 0.5; // 50% chance of plagiarism
                    if (isPlagiarized) {
                        const percentage = (Math.random() * 50 + 50).toFixed(2); // 50-100%
                        resultsDiv.innerHTML = `<div class="alert alert-danger">Plagiarism Detected! ${percentage}% similarity found.</div>`;
                    } else {
                        resultsDiv.innerHTML = '<div class="alert alert-success">No Plagiarism Detected. Your text is original!</div>';
                    }
                }, 2000);
            });

            console.log('Plagiarism Checker loaded.');
        });
    </script>
</body>
</html>

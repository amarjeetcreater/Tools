<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fancy Text Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">Fancy Text Generator</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Fancy Text Generator</h5>
                <div class="mb-3">
                    <label for="inputText" class="form-label">Enter Text:</label>
                    <textarea class="form-control" id="inputText" rows="3" placeholder="Type or paste your text here..."></textarea>
                </div>
                <div id="output" class="mt-3"></div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        // JavaScript for Fancy Text Generator tool
        document.addEventListener('DOMContentLoaded', function() {
            const inputText = document.getElementById('inputText');
            const outputDiv = document.getElementById('output');

            const fancyMap = {
                bold: {
                    normal: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789',
                    fancy:  'рқ—”рқ—•рқ—–рқ——рқ—ҳрқ—ҷрқ—ҡрқ—ӣрқ—ңрқ—қрқ—һрқ—ҹрқ— рқ—Ўрқ—ўрқ—Јрқ—Өрқ—Ҙрқ—Ұрқ—§рқ—Ёрқ—©рқ—Әрқ—«рқ—¬рқ—ӯрқ—®рқ—Ҝрқ—°рқ—ұрқ—Ірқ—ірқ—ҙрқ—өрқ—¶рқ—·рқ—ёрқ—№рқ—әрқ—»рқ—јрқ—Ҫрқ—ҫрқ—ҝрқҳҖрқҳҒрқҳӮрқҳғрқҳ„рқҳ…рқҳҶрқҳҮрқҹ¬рқҹӯрқҹ®рқҹҜрқҹ°рқҹұрқҹІрқҹірқҹҙрқҹө'
                },
                italic: {
                    normal: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz',
                    fancy:  'рқҳҲрқҳүрқҳҠрқҳӢрқҳҢрқҳҚрқҳҺрқҳҸрқҳҗрқҳ‘рқҳ’рқҳ“рқҳ”рқҳ•рқҳ–рқҳ—рқҳҳрқҳҷрқҳҡрқҳӣрқҳңрқҳқрқҳһрқҳҹрқҳ рқҳЎрқҳўрқҳЈрқҳӨрқҳҘрқҳҰрқҳ§рқҳЁрқҳ©рқҳӘрқҳ«рқҳ¬рқҳӯрқҳ®рқҳҜрқҳ°рқҳұрқҳІрқҳірқҳҙрқҳөрқҳ¶рқҳ·рқҳёрқҳ№рқҳәрқҳ»'
                },
                script: {
                    normal: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz',
                    fancy:  'рқ’ңрқҗөрқ’һрқ’ҹрқҗёрқҗ№рқ’ўрқҗ»рқҗјрқ’Ҙрқ’Ұрқҗҝрқ‘Җрқ’©рқ’Әрқ’«рқ’¬рқ‘…рқ’®рқ’Ҝрқ’°рқ’ұрқ’Ірқ’ірқ’ҙрқ’өрқ’¶рқ’·рқ’ёрқ’№рқ‘’рқ’»рқ‘”рқ’Ҫрқ’ҫрқ’ҝрқ“Җрқ“Ғрқ“Ӯрқ“ғрқ‘ңрқ“…рқ“Ҷрқ“Үрқ“Ҳрқ“үрқ“Ҡрқ“Ӣрқ“Ңрқ“Қрқ“Һрқ“Ҹ'
                },
                fraktur: {
                    normal: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz',
                    fancy:  'рқ”„рқ”…в„ӯрқ”Үрқ”Ҳрқ”үрқ”Ҡв„Ңв„‘рқ”Қрқ”Һрқ”Ҹрқ”җрқ”‘рқ”’рқ”“рқ””в„ңрқ”–рқ”—рқ”ҳрқ”ҷрқ”ҡрқ”ӣрқ”ңв„Ёрқ”һрқ”ҹрқ” рқ”Ўрқ”ўрқ”Јрқ”Өрқ”Ҙрқ”Ұрқ”§рқ”Ёрқ”©рқ”Әрқ”«рқ”¬рқ”ӯрқ”®рқ”Ҝрқ”°рқ”ұрқ”Ірқ”ірқ”ҙрқ”өрқ”¶рқ”·'
                },
                doubleStruck: {
                    normal: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789',
                    fancy:  'рқ”ёрқ”№в„Ӯрқ”»рқ”јрқ”Ҫрқ”ҫв„Қрқ•Җрқ•Ғрқ•Ӯрқ•ғрқ•„в„•рқ•Ҷв„ҷв„ҡв„қрқ•Ҡрқ•Ӣрқ•Ңрқ•Қрқ•Һрқ•Ҹрқ•җв„Өрқ•’рқ•“рқ•”рқ••рқ•–рқ•—рқ•ҳрқ•ҷрқ•ҡрқ•ӣрқ•ңрқ•қрқ•һрқ•ҹрқ• рқ•Ўрқ•ўрқ•Јрқ•Өрқ•Ҙрқ•Ұрқ•§рқ•Ёрқ•©рқ•Әрқ•«рқҹҳрқҹҷрқҹҡрқҹӣрқҹңрқҹқрқҹһрқҹҹрқҹ рқҹЎ'
                },
                monospace: {
                    normal: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789',
                    fancy:  'рқҷ°рқҷұрқҷІрқҷірқҷҙрқҷөрқҷ¶рқҷ·рқҷёрқҷ№рқҷәрқҷ»рқҷјрқҷҪрқҷҫрқҷҝрқҡҖрқҡҒрқҡӮрқҡғрқҡ„рқҡ…рқҡҶрқҡҮрқҡҲрқҡүрқҡҠрқҡӢрқҡҢрқҡҚрқҡҺрқҡҸрқҡҗрқҡ‘рқҡ’рқҡ“рқҡ”рқҡ•рқҡ–рқҡ—рқҡҳрқҡҷрқҡҡрқҡӣрқҡңрқҡқрқҡһрқҡҹрқҡ рқҡЎрқҡўрқҡЈ0123456789'
                },
                circled: {
                    normal: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789',
                    fancy:  'в’¶в’·в’ёв’№в’әв’»в’јв’Ҫв’ҫв’ҝв“Җв“Ғв“Ӯв“ғв“„в“…в“Ҷв“Үв“Ҳв“үв“Ҡв“Ӣв“Ңв“Қв“Һв“Ҹв“җв“‘в“’в““в“”в“•в“–в“—в“ҳв“ҷв“ҡв“ӣв“ңв“қв“һв“ҹв“ в“Ўв“ўв“Јв“Өв“Ҙв“Ұв“§в“Ёв“©в“Әв‘ в‘Ўв‘ўв‘Јв‘Өв‘Ҙв‘Ұв‘§в‘Ё'
                },
                squared: {
                    normal: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz',
                    fancy:  'рҹ„°рҹ„ұрҹ„Ірҹ„ірҹ„ҙрҹ„өрҹ„¶рҹ„·рҹ„ёрҹ„№рҹ„әрҹ„»рҹ„јрҹ„Ҫрҹ„ҫрҹ„ҝпјұрҹ…Ғрҹ…Ӯрҹ…ғрҹ…„рҹ……рҹ…Ҷрҹ…Үрҹ…Ҳрҹ…үрҹ…°рҹ…ұрҹ…Ірҹ…ірҹ…ҙрҹ…өрҹ…¶рҹ…·рҹ…ёрҹ…№рҹ…әрҹ…»рҹ…јрҹ…Ҫрҹ…ҫрҹ…ҝрҹҶҖрҹҶҒрҹҶӮрҹҶғрҹҶ„рҹҶ…рҹҶҶрҹҶҮрҹҶҲрҹҶү'
                }
            };

            function generateFancyText(text, type) {
                let result = '';
                const normalChars = fancyMap[type].normal;
                const fancyChars = fancyMap[type].fancy;
                for (let i = 0; i < text.length; i++) {
                    const char = text[i];
                    const index = normalChars.indexOf(char);
                    if (index !== -1) {
                        result += fancyChars[index];
                    } else {
                        result += char;
                    }
                }
                return result;
            }

            function updateFancyText() {
                const text = inputText.value;
                let htmlOutput = '';

                for (const type in fancyMap) {
                    if (fancyMap.hasOwnProperty(type)) {
                        const fancyText = generateFancyText(text, type);
                        htmlOutput += `
                            <div class="mb-3">
                                <label class="form-label">${type.charAt(0).toUpperCase() + type.slice(1)}:</label>
                                <div class="input-group">
                                    <textarea class="form-control fancy-text-output" rows="1" readonly>${fancyText}</textarea>
                                    <button class="btn btn-outline-secondary copy-btn" type="button" data-text="${fancyText}">Copy</button>
                                </div>
                            </div>
                        `;
                    }
                }
                outputDiv.innerHTML = htmlOutput;

                document.querySelectorAll('.copy-btn').forEach(button => {
                    button.addEventListener('click', function() {
                        const textToCopy = this.dataset.text;
                        navigator.clipboard.writeText(textToCopy).then(() => {
                            alert('Copied to clipboard!');
                        }).catch(err => {
                            console.error('Failed to copy: ', err);
                        });
                    });
                });
            }

            inputText.addEventListener('input', updateFancyText);
            updateFancyText(); // Initial generation
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Compressor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">Image Compressor</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Image Compressor Functionality</h5>
                <input type="file" class="form-control" id="imageUpload" accept="image/*">
                <div class="mt-3">
                    <label for="qualityInput" class="form-label">Compression Quality (0.1 - 1.0):</label>
                    <input type="number" class="form-control" id="qualityInput" value="0.8" min="0.1" max="1.0" step="0.1">
                </div>
                <button class="btn btn-primary mt-3" id="compressBtn">Compress Image</button>
                <div class="mt-3" id="downloadLink" style="display:none;">
                    <a href="#" id="downloadAnchor" download="compressed-image.jpg" class="btn btn-success">Download Compressed Image</a>
                </div>
                <div class="mt-3">
                    <p>Original Size: <span id="originalSize">N/A</span></p>
                    <p>Compressed Size: <span id="compressedSize">N/A</span></p>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const imageUpload = document.getElementById('imageUpload');
            const qualityInput = document.getElementById('qualityInput');
            const compressBtn = document.getElementById('compressBtn');
            const downloadLink = document.getElementById('downloadLink');
            const downloadAnchor = document.getElementById('downloadAnchor');
            const originalSizeSpan = document.getElementById('originalSize');
            const compressedSizeSpan = document.getElementById('compressedSize');

            imageUpload.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    originalSizeSpan.textContent = (file.size / 1024).toFixed(2) + ' KB';
                    compressedSizeSpan.textContent = 'N/A';
                    downloadLink.style.display = 'none';
                }
            });

            compressBtn.addEventListener('click', function() {
                const file = imageUpload.files[0];
                const quality = parseFloat(qualityInput.value);

                if (!file) {
                    alert('Please select an image.');
                    return;
                }
                if (isNaN(quality) || quality < 0.1 || quality > 1.0) {
                    alert('Please enter a valid compression quality between 0.1 and 1.0.');
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0);

                        canvas.toBlob(function(blob) {
                            const url = URL.createObjectURL(blob);
                            downloadAnchor.href = url;
                            downloadLink.style.display = 'block';
                            compressedSizeSpan.textContent = (blob.size / 1024).toFixed(2) + ' KB';
                        }, 'image/jpeg', quality);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        });
    </script>
</body>
</html>

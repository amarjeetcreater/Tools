<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Tag Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">Meta Tag Generator</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Meta Tag Generator Functionality</h5>
                <p class="card-text">Generate essential meta tags for your website.</p>
                <div class="mb-3">
                    <label for="metaTitle" class="form-label">Title:</label>
                    <input type="text" class="form-control" id="metaTitle" placeholder="e.g., My Awesome Website">
                </div>
                <div class="mb-3">
                    <label for="metaDescription" class="form-label">Description:</label>
                    <textarea class="form-control" id="metaDescription" rows="3" placeholder="e.g., A brief description of my website."></textarea>
                </div>
                <div class="mb-3">
                    <label for="metaKeywords" class="form-label">Keywords (comma-separated):</label>
                    <input type="text" class="form-control" id="metaKeywords" placeholder="e.g., website, development, tools">
                </div>
                <div class="mb-3">
                    <label for="metaAuthor" class="form-label">Author:</label>
                    <input type="text" class="form-control" id="metaAuthor" placeholder="e.g., John Doe">
                </div>
                <button class="btn btn-primary" id="generateMetaTagsBtn">Generate Meta Tags</button>
                <div class="mt-4">
                    <h6>Generated Meta Tags:</h6>
                    <pre><code id="generatedMetaTags" class="language-html"></code></pre>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        // JavaScript for Meta Tag Generator tool
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Meta Tag Generator loaded.');

            const metaTitleInput = document.getElementById('metaTitle');
            const metaDescriptionInput = document.getElementById('metaDescription');
            const metaKeywordsInput = document.getElementById('metaKeywords');
            const metaAuthorInput = document.getElementById('metaAuthor');
            const generateMetaTagsBtn = document.getElementById('generateMetaTagsBtn');
            const generatedMetaTagsCode = document.getElementById('generatedMetaTags');

            generateMetaTagsBtn.addEventListener('click', function() {
                const title = metaTitleInput.value.trim();
                const description = metaDescriptionInput.value.trim();
                const keywords = metaKeywordsInput.value.trim();
                const author = metaAuthorInput.value.trim();

                let metaTagsHtml = '';

                if (title) {
                    metaTagsHtml += `<meta name="title" content="${title}">\n`;
                }
                if (description) {
                    metaTagsHtml += `<meta name="description" content="${description}">\n`;
                }
                if (keywords) {
                    metaTagsHtml += `<meta name="keywords" content="${keywords}">\n`;
                }
                if (author) {
                    metaTagsHtml += `<meta name="author" content="${author}">\n`;
                }

                if (metaTagsHtml) {
                    generatedMetaTagsCode.textContent = metaTagsHtml;
                } else {
                    generatedMetaTagsCode.textContent = 'Please fill in at least one field to generate meta tags.';
                }
            });
        });
    </script>
</body>
</html>

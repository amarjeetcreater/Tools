<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text to Slug Converter - Multi-Tools</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-5">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h1 class="mb-0">Text to Slug Converter</h1>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label for="textInput" class="form-label">Enter your text:</label>
                    <textarea class="form-control" id="textInput" rows="5" placeholder="Type or paste your text here..."></textarea>
                </div>
                <button class="btn btn-primary mt-3" id="convertToSlugBtn">Convert to Slug</button>
                <div class="mt-3">
                    <label for="slugOutput" class="form-label">Generated Slug:</label>
                    <div class="input-group">
                        <input type="text" class="form-control" id="slugOutput" readonly>
                        <button class="btn btn-outline-secondary" type="button" id="copyBtn">Copy</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const textInput = document.getElementById('textInput');
            const convertToSlugBtn = document.getElementById('convertToSlugBtn');
            const slugOutput = document.getElementById('slugOutput');
            const copyBtn = document.getElementById('copyBtn');

            const generateSlug = (text) => {
                return text
                    .toString()
                    .normalize('NFD')
                    .replace(/\p{M}/gu, '')
                    .toLowerCase()
                    .trim()
                    .replace(/[^\w\s-]/g, '')
                    .replace(/[\s_-]+/g, '-')
                    .replace(/^-+|-+$/g, '');
            };

            convertToSlugBtn.addEventListener('click', () => {
                slugOutput.value = generateSlug(textInput.value);
            });

            copyBtn.addEventListener('click', () => {
                slugOutput.select();
                slugOutput.setSelectionRange(0, 99999); // For mobile devices
                document.execCommand('copy');
                alert('Slug copied to clipboard!');
            });

            // Optional: Generate slug on input change
            textInput.addEventListener('input', () => {
                slugOutput.value = generateSlug(textInput.value);
            });
        });
    </script>
</body>
</html>

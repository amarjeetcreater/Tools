<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Counter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">Character Counter</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Enter your text below:</h5>
                <div class="mb-3">
                    <textarea class="form-control" id="textInput" rows="10" placeholder="Start typing or paste your text here..."></textarea>
                </div>
                <div class="row text-center">
                    <div class="col-md-6">
                        <p class="fs-5">Characters: <span id="charCount" class="fw-bold">0</span></p>
                    </div>
                    <div class="col-md-6">
                        <p class="fs-5">Words: <span id="wordCount" class="fw-bold">0</span></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        // JavaScript for Character Counter tool
        document.addEventListener('DOMContentLoaded', function() {
            const textInput = document.getElementById('textInput');
            const charCount = document.getElementById('charCount');
            const wordCount = document.getElementById('wordCount');

            textInput.addEventListener('input', function() {
                const text = textInput.value;
                charCount.textContent = text.length;

                const words = text.split(/\s+/).filter(word => word.length > 0);
                wordCount.textContent = words.length;
            });

            console.log('Character Counter loaded.');
        });
    </script>
</body>
</html>

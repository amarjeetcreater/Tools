<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Number Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">Random Number Generator</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Random Number Generator Functionality</h5>
                <div class="mb-3">
                    <label for="minInput" class="form-label">Minimum Value:</label>
                    <input type="number" class="form-control" id="minInput" value="1">
                </div>
                <div class="mb-3">
                    <label for="maxInput" class="form-label">Maximum Value:</label>
                    <input type="number" class="form-control" id="maxInput" value="100">
                </div>
                <button class="btn btn-primary mt-3" id="generateBtn">Generate Number</button>
                <div class="mt-3">
                    <p>Generated Number: <span id="randomNumberOutput" class="fw-bold"></span></p>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const minInput = document.getElementById('minInput');
            const maxInput = document.getElementById('maxInput');
            const generateBtn = document.getElementById('generateBtn');
            const randomNumberOutput = document.getElementById('randomNumberOutput');

            generateBtn.addEventListener('click', function() {
                const min = parseInt(minInput.value);
                const max = parseInt(maxInput.value);

                if (isNaN(min) || isNaN(max)) {
                    alert('Please enter valid minimum and maximum values.');
                    return;
                }

                if (min > max) {
                    alert('Minimum value cannot be greater than maximum value.');
                    return;
                }

                const randomNumber = Math.floor(Math.random() * (max - min + 1)) + min;
                randomNumberOutput.textContent = randomNumber;
            });
        });
    </script>
</body>
</html>

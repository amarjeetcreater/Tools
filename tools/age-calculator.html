<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">Age Calculator</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Age Calculator Functionality</h5>
                <div class="mb-3">
                    <label for="dobInput" class="form-label">Enter your Date of Birth:</label>
                    <input type="date" class="form-control" id="dobInput">
                </div>
                <button class="btn btn-primary mt-3" id="calculateBtn">Calculate Age</button>
                <div class="mt-3">
                    <p>Your age is: <span id="ageOutput" class="fw-bold"></span></p>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const dobInput = document.getElementById('dobInput');
            const calculateBtn = document.getElementById('calculateBtn');
            const ageOutput = document.getElementById('ageOutput');

            calculateBtn.addEventListener('click', function() {
                const dob = new Date(dobInput.value);
                if (isNaN(dob.getTime())) {
                    alert('Please enter a valid date of birth.');
                    return;
                }

                const today = new Date();
                let age = today.getFullYear() - dob.getFullYear();
                const monthDiff = today.getMonth() - dob.getMonth();
                const dayDiff = today.getDate() - dob.getDate();

                if (monthDiff < 0 || (monthDiff === 0 && dayDiff < 0)) {
                    age--;
                }

                ageOutput.textContent = age + ' years';
            });
        });
    </script>
</body>
</html>

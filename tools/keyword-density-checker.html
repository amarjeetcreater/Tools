<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyword Density Checker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">Keyword Density Checker</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Keyword Density Checker Functionality</h5>
                <p class="card-text">Enter your text below to check keyword density.</p>
                <div class="mb-3">
                    <label for="textInput" class="form-label">Text:</label>
                    <textarea class="form-control" id="textInput" rows="10" placeholder="Paste your text here..."></textarea>
                </div>
                <button class="btn btn-primary" id="checkDensityBtn">Check Keyword Density</button>
                <div class="mt-4">
                    <h6>Keyword Density Results:</h6>
                    <div id="resultsTable" class="table-responsive">
                        <table class="table table-striped">
                            <thead>
                                <tr>
                                    <th>Keyword</th>
                                    <th>Count</th>
                                    <th>Density (%)</th>
                                </tr>
                            </thead>
                            <tbody id="densityResultsBody">
                                <!-- Results will be inserted here -->
                            </tbody>
                        </table>
                    </div>
                    <p id="noResultsMessage" class="text-muted mt-3" style="display: none;">No keywords found or text is too short.</p>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        // JavaScript for Keyword Density Checker tool
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Keyword Density Checker loaded.');

            const textInput = document.getElementById('textInput');
            const checkDensityBtn = document.getElementById('checkDensityBtn');
            const densityResultsBody = document.getElementById('densityResultsBody');
            const noResultsMessage = document.getElementById('noResultsMessage');

            checkDensityBtn.addEventListener('click', function() {
                const text = textInput.value.trim();
                densityResultsBody.innerHTML = '';
                noResultsMessage.style.display = 'none';

                if (text.length < 10) {
                    noResultsMessage.textContent = 'Please enter more text to analyze.';
                    noResultsMessage.style.display = 'block';
                    return;
                }

                const words = text.toLowerCase().match(/\b\w+\b/g);
                if (!words || words.length === 0) {
                    noResultsMessage.textContent = 'No words found in the text.';
                    noResultsMessage.style.display = 'block';
                    return;
                }

                const wordCounts = {};
                words.forEach(word => {
                    wordCounts[word] = (wordCounts[word] || 0) + 1;
                });

                const totalWords = words.length;
                const sortedKeywords = Object.entries(wordCounts).sort(([, countA], [, countB]) => countB - countA);

                if (sortedKeywords.length === 0) {
                    noResultsMessage.textContent = 'No keywords found or text is too short.';
                    noResultsMessage.style.display = 'block';
                    return;
                }

                sortedKeywords.forEach(([keyword, count]) => {
                    const density = ((count / totalWords) * 100).toFixed(2);
                    const row = `
                        <tr>
                            <td>${keyword}</td>
                            <td>${count}</td>
                            <td>${density}%</td>
                        </tr>
                    `;
                    densityResultsBody.insertAdjacentHTML('beforeend', row);
                });
            });
        });
    </script>
</body>
</html>

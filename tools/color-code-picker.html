<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Code Picker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">Color Code Picker</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6 offset-md-3">
                        <div class="mb-3">
                            <label for="colorInput" class="form-label">Choose a Color</label>
                            <input type="color" class="form-control form-control-color" id="colorInput" value="#000000" title="Choose your color">
                        </div>
                        <div class="mb-3">
                            <label for="hexCode" class="form-label">HEX Code</label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="hexCode" readonly>
                                <button class="btn btn-outline-secondary copy-btn" type="button" data-target="hexCode"><i class="fas fa-copy"></i></button>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="rgbCode" class="form-label">RGB Code</label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="rgbCode" readonly>
                                <button class="btn btn-outline-secondary copy-btn" type="button" data-target="rgbCode"><i class="fas fa-copy"></i></button>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="hslCode" class="form-label">HSL Code</label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="hslCode" readonly>
                                <button class="btn btn-outline-secondary copy-btn" type="button" data-target="hslCode"><i class="fas fa-copy"></i></button>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="cmykCode" class="form-label">CMYK Code</label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="cmykCode" readonly>
                                <button class="btn btn-outline-secondary copy-btn" type="button" data-target="cmykCode"><i class="fas fa-copy"></i></button>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="colorDisplay" class="form-label">Color Preview</label>
                            <div id="colorDisplay" style="width: 100%; height: 100px; border: 1px solid #ccc;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const colorInput = document.getElementById('colorInput');
            const hexCode = document.getElementById('hexCode');
            const rgbCode = document.getElementById('rgbCode');
            const hslCode = document.getElementById('hslCode');
            const cmykCode = document.getElementById('cmykCode');
            const colorDisplay = document.getElementById('colorDisplay');
            const copyButtons = document.querySelectorAll('.copy-btn');

            function hexToRgb(hex) {
                const r = parseInt(hex.substring(1, 3), 16);
                const g = parseInt(hex.substring(3, 5), 16);
                const b = parseInt(hex.substring(5, 7), 16);
                return `rgb(${r}, ${g}, ${b})`;
            }

            function rgbToHsl(r, g, b) {
                r /= 255;
                g /= 255;
                b /= 255;

                const max = Math.max(r, g, b);
                const min = Math.min(r, g, b);
                let h, s, l = (max + min) / 2;

                if (max === min) {
                    h = s = 0; // achromatic
                } else {
                    const d = max - min;
                    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                    switch (max) {
                        case r:
                            h = (g - b) / d + (g < b ? 6 : 0);
                            break;
                        case g:
                            h = (b - r) / d + 2;
                            break;
                        case b:
                            h = (r - g) / d + 4;
                            break;
                    }
                    h /= 6;
                }

                return `hsl(${Math.round(h * 360)}, ${Math.round(s * 100)}%, ${Math.round(l * 100)}%)`;
            }

            function rgbToCmyk(r, g, b) {
                let c = 1 - (r / 255);
                let m = 1 - (g / 255);
                let y = 1 - (b / 255);
                let k = Math.min(c, Math.min(m, y));

                c = (c - k) / (1 - k);
                m = (m - k) / (1 - k);
                y = (y - k) / (1 - k);

                return `cmyk(${Math.round(c * 100)}%, ${Math.round(m * 100)}%, ${Math.round(y * 100)}%, ${Math.round(k * 100)}%)`;
            }

            function updateColorInfo(hex) {
                colorDisplay.style.backgroundColor = hex;
                hexCode.value = hex;

                const r = parseInt(hex.substring(1, 3), 16);
                const g = parseInt(hex.substring(3, 5), 16);
                const b = parseInt(hex.substring(5, 7), 16);

                rgbCode.value = `rgb(${r}, ${g}, ${b})`;
                hslCode.value = rgbToHsl(r, g, b);
                cmykCode.value = rgbToCmyk(r, g, b);
            }

            colorInput.addEventListener('input', function() {
                updateColorInfo(colorInput.value);
            });

            copyButtons.forEach(button => {
                button.addEventListener('click', function() {
                    const targetId = this.dataset.target;
                    const targetElement = document.getElementById(targetId);
                    targetElement.select();
                    targetElement.setSelectionRange(0, 99999);
                    document.execCommand('copy');
                    alert(`${targetId.toUpperCase()} code copied to clipboard!`);
                });
            });

            // Initial update
            updateColorInfo(colorInput.value);
        });
    </script>
</body>
</html>

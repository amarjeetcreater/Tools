<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Speed Checker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">Page Speed Checker</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Page Speed Checker Functionality</h5>
                <p class="card-text">Enter a URL to check its page speed.</p>
                <div class="mb-3">
                    <label for="urlInput" class="form-label">URL:</label>
                    <input type="url" class="form-control" id="urlInput" placeholder="https://example.com">
                </div>
                <button class="btn btn-primary" id="checkSpeedBtn">Check Page Speed</button>
                <div class="mt-3" id="resultsDisplay">
                    <!-- Results will be displayed here -->
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        // JavaScript for Page Speed Checker tool
        document.addEventListener('DOMContentLoaded', function() {
            const urlInput = document.getElementById('urlInput');
            const checkSpeedBtn = document.getElementById('checkSpeedBtn');
            const resultsDisplay = document.getElementById('resultsDisplay');

            checkSpeedBtn.addEventListener('click', function() {
                const url = urlInput.value.trim();
                if (url) {
                    resultsDisplay.innerHTML = `<p>Checking page speed for: <strong>${url}</strong>...</p>`;
                    // Simulate page speed check
                    setTimeout(() => {
                        const performanceScore = Math.floor(Math.random() * 50) + 50; // 50-100
                        const fcp = (Math.random() * 3 + 1).toFixed(2); // 1-4 seconds
                        const lcp = (Math.random() * 5 + 2).toFixed(2); // 2-7 seconds
                        const tbt = (Math.random() * 300 + 100).toFixed(0); // 100-400 ms

                        resultsDisplay.innerHTML = `
                            <p><strong>Results for ${url}:</strong></p>
                            <p>Performance Score: ${performanceScore}/100</p>
                            <p>First Contentful Paint (FCP): ${fcp}s</p>
                            <p>Largest Contentful Paint (LCP): ${lcp}s</p>
                            <p>Total Blocking Time (TBT): ${tbt}ms</p>
                            <p><em>(Note: This is a simulated result. Real page speed checking requires external APIs like Lighthouse.)</em></p>
                        `;
                    }, 2500);
                } else {
                    resultsDisplay.innerHTML = '<p class="text-danger">Please enter a valid URL.</p>';
                }
            });
        });
    </script>
</body>
</html>

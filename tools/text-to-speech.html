<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text-to-Speech</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">Text-to-Speech</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Enter Text to Convert to Speech</h5>
                <div class="mb-3">
                    <textarea class="form-control" id="textInput" rows="8" placeholder="Type or paste your text here..."></textarea>
                </div>
                <div class="mb-3">
                    <label for="voiceSelect" class="form-label">Select Voice:</label>
                    <select class="form-select" id="voiceSelect"></select>
                </div>
                <button id="speakBtn" class="btn btn-primary">Speak</button>
                <button id="stopBtn" class="btn btn-danger" disabled>Stop</button>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        // JavaScript for Text-to-Speech tool
        document.addEventListener('DOMContentLoaded', function() {
            const textInput = document.getElementById('textInput');
            const voiceSelect = document.getElementById('voiceSelect');
            const speakBtn = document.getElementById('speakBtn');
            const stopBtn = document.getElementById('stopBtn');

            let synth = window.speechSynthesis;
            let voices = [];

            function populateVoiceList() {
                voices = synth.getVoices().sort(function (a, b) {
                    const aname = a.name.toUpperCase();
                    const bname = b.name.toUpperCase();
                    if (aname < bname) return -1;
                    else if (aname == bname) return 0;
                    else return +1;
                });
                const selectedIndex = voiceSelect.selectedIndex < 0 ? 0 : voiceSelect.selectedIndex;
                voiceSelect.innerHTML = '';
                for (let i = 0; i < voices.length; i++) {
                    const option = document.createElement('option');
                    option.textContent = voices[i].name + ' (' + voices[i].lang + ')';

                    if (voices[i].default) {
                        option.textContent += ' -- DEFAULT';
                    }

                    option.setAttribute('data-lang', voices[i].lang);
                    option.setAttribute('data-name', voices[i].name);
                    voiceSelect.appendChild(option);
                }
                voiceSelect.selectedIndex = selectedIndex;
            }

            populateVoiceList();
            if (synth.onvoiceschanged !== undefined) {
                synth.onvoiceschanged = populateVoiceList;
            }

            speakBtn.addEventListener('click', function() {
                if (textInput.value !== '') {
                    if (synth.speaking) {
                        synth.cancel();
                    }
                    const utterThis = new SpeechSynthesisUtterance(textInput.value);
                    utterThis.onend = function (event) {
                        console.log('SpeechSynthesisUtterance.onend');
                        speakBtn.disabled = false;
                        stopBtn.disabled = true;
                    };
                    utterThis.onerror = function (event) {
                        console.error('SpeechSynthesisUtterance.onerror', event);
                        speakBtn.disabled = false;
                        stopBtn.disabled = true;
                    };
                    const selectedVoiceName = voiceSelect.selectedOptions[0].getAttribute('data-name');
                    for (let i = 0; i < voices.length; i++) {
                        if (voices[i].name === selectedVoiceName) {
                            utterThis.voice = voices[i];
                            break;
                        }
                    }
                    synth.speak(utterThis);
                    speakBtn.disabled = true;
                    stopBtn.disabled = false;
                }
            });

            stopBtn.addEventListener('click', function() {
                synth.cancel();
                speakBtn.disabled = false;
                stopBtn.disabled = true;
            });

            console.log('Text-to-Speech loaded.');
        });
    </script>
</body>
</html>

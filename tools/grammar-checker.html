<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grammar Checker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">Grammar Checker</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Enter Text for Grammar Check</h5>
                <div class="mb-3">
                    <textarea class="form-control" id="textInput" rows="10" placeholder="Paste your text here..."></textarea>
                </div>
                <button id="checkGrammarBtn" class="btn btn-primary">Check Grammar</button>
                <div class="mt-3" id="results"></div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        // JavaScript for Grammar Checker tool
        document.addEventListener('DOMContentLoaded', function() {
            const textInput = document.getElementById('textInput');
            const checkGrammarBtn = document.getElementById('checkGrammarBtn');
            const resultsDiv = document.getElementById('results');

            checkGrammarBtn.addEventListener('click', function() {
                const text = textInput.value.trim();
                if (text === '') {
                    resultsDiv.innerHTML = '<div class="alert alert-warning">Please enter some text to check.</div>';
                    return;
                }

                resultsDiv.innerHTML = '<div class="alert alert-info">Checking grammar...</div>';

                // Simulate grammar check
                setTimeout(() => {
                    const issues = [
                        "'Their' should be 'there'.",
                        "Missing comma after introductory phrase.",
                        "Subject-verb agreement error.",
                        "Spelling mistake: 'recieve' should be 'receive'."
                    ];
                    const numIssues = Math.floor(Math.random() * 3); // 0 to 2 issues
                    if (numIssues > 0) {
                        let output = '<div class="alert alert-danger">Grammar issues found:<ul>';
                        for (let i = 0; i < numIssues; i++) {
                            output += `<li>${issues[Math.floor(Math.random() * issues.length)]}</li>`;
                        }
                        output += '</ul></div>';
                        resultsDiv.innerHTML = output;
                    } else {
                        resultsDiv.innerHTML = '<div class="alert alert-success">No grammar issues found. Your text is grammatically correct!</div>';
                    }
                }, 2000);
            });

            console.log('Grammar Checker loaded.');
        });
    </script>
</body>
</html>

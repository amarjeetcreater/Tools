<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Keyboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">Emoji Keyboard</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Find and Copy Emojis</h5>
                <div class="mb-3">
                    <input type="text" class="form-control" id="emojiSearch" placeholder="Search for emojis...">
                </div>
                <div id="emojiContainer" class="d-flex flex-wrap justify-content-center" style="max-height: 400px; overflow-y: auto; border: 1px solid #eee; padding: 10px; border-radius: 5px;">
                    <!-- Emojis will be loaded here -->
                </div>
                <div class="mt-3 text-center">
                    <button class="btn btn-primary" id="copyEmojiBtn" style="display: none;">Copy Selected Emoji</button>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        // JavaScript for Emoji Keyboard tool
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Emoji Keyboard loaded.');

            const emojiSearch = document.getElementById('emojiSearch');
            const emojiContainer = document.getElementById('emojiContainer');
            const copyEmojiBtn = document.getElementById('copyEmojiBtn');
            let selectedEmoji = '';

            // Fetch emojis from a public API or a local JSON file
            async function fetchEmojis() {
                try {
                    // Using a proxy to bypass CORS issues with a direct fetch from a public emoji API
                    const response = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent('https://api.github.com/emojis'));
                    const data = await response.json();
                    displayEmojis(data);
                } catch (error) {
                    console.error('Error fetching emojis:', error);
                    emojiContainer.innerHTML = '<p class="text-danger">Failed to load emojis. Please try again later.</p>';
                }
            }

            function displayEmojis(emojis) {
                emojiContainer.innerHTML = '';
                const emojiNames = Object.keys(emojis);
                emojiNames.forEach(name => {
                    const emojiUrl = emojis[name];
                    // For simplicity, we'll use a placeholder or a common emoji representation
                    // A real emoji keyboard would need a more robust emoji data source
                    const emojiChar = getEmojiCharFromName(name); // Custom function to get emoji char
                    if (emojiChar) {
                        const emojiSpan = document.createElement('span');
                        emojiSpan.classList.add('emoji-item', 'p-2', 'm-1', 'border', 'rounded', 'bg-light', 'cursor-pointer');
                        emojiSpan.style.cursor = 'pointer';
                        emojiSpan.textContent = emojiChar;
                        emojiSpan.setAttribute('data-emoji', emojiChar);
                        emojiSpan.title = `:${name}:`;
                        emojiSpan.addEventListener('click', () => selectEmoji(emojiSpan, emojiChar));
                        emojiContainer.appendChild(emojiSpan);
                    }
                });
            }

                    'woozy_face': '🥴', 'exploding_head': '🤯', 'cowboy_hat_face': '🤠', 'partying_face': '🥳',
                    'disguised_face': '🥸', 'smiling_face_with_tear': '🥲', 'face_holding_back_tears': '🥹',
                    'face_with_peeking_eye': '🫣', 'saluting_face': '🫡', 'melting_face': '🫠',
                    'face_with_open_eyes_and_hand_over_mouth': '🫢', 'face_with_diagonal_mouth': '🫤',
                    'dotted_line_face': '🫥'
                };
                return emojiMap[name] || '';
            }

            function selectEmoji(element, emoji) {
                // Remove selection from previously selected emoji
                const currentSelected = emojiContainer.querySelector('.selected-emoji');
                if (currentSelected) {
                    currentSelected.classList.remove('selected-emoji');
                    currentSelected.style.backgroundColor = '';
                }

                // Add selection to the clicked emoji
                element.classList.add('selected-emoji');
                element.style.backgroundColor = '#d1e7dd'; // Bootstrap success light green
                selectedEmoji = emoji;
                copyEmojiBtn.style.display = 'block';
            }

            emojiSearch.addEventListener('input', function() {
                const searchTerm = emojiSearch.value.toLowerCase();
                const emojiItems = emojiContainer.querySelectorAll('.emoji-item');
                emojiItems.forEach(item => {
                    const emojiName = item.title.toLowerCase();
                    if (emojiName.includes(searchTerm)) {
                        item.style.display = 'inline-block';
                    } else {
                        item.style.display = 'none';
                    }
                });
            });

            copyEmojiBtn.addEventListener('click', function() {
                if (selectedEmoji) {
                    navigator.clipboard.writeText(selectedEmoji).then(() => {
                        alert('Emoji copied to clipboard: ' + selectedEmoji);
                    }).catch(err => {
                        console.error('Failed to copy emoji: ', err);
                        alert('Failed to copy emoji.');
                    });
                } else {
                    alert('Please select an emoji first.');
                }
            });

            fetchEmojis();
        });
    </script>
</body>
</html>

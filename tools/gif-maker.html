<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIF Maker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">GIF Maker</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">GIF Maker Functionality</h5>
                <input type="file" class="form-control" id="imageUpload" accept="image/*" multiple>
                <div class="mt-3">
                    <label for="delayInput" class="form-label">Frame Delay (ms):</label>
                    <input type="number" class="form-control" id="delayInput" value="200" min="50">
                </div>
                <button class="btn btn-primary mt-3" id="makeGifBtn">Make GIF</button>
                <div class="mt-3" id="gifPreview" style="display:none;">
                    <img id="previewImage" src="#" alt="GIF Preview" style="max-width: 100%;">
                </div>
                <div class="mt-3" id="downloadLink" style="display:none;">
                    <a href="#" id="downloadAnchor" download="animated.gif" class="btn btn-success">Download GIF</a>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const imageUpload = document.getElementById('imageUpload');
            const delayInput = document.getElementById('delayInput');
            const makeGifBtn = document.getElementById('makeGifBtn');
            const gifPreview = document.getElementById('gifPreview');
            const previewImage = document.getElementById('previewImage');
            const downloadLink = document.getElementById('downloadLink');
            const downloadAnchor = document.getElementById('downloadAnchor');

            makeGifBtn.addEventListener('click', function() {
                const files = imageUpload.files;
                const delay = parseInt(delayInput.value);

                if (files.length === 0) {
                    alert('Please select images to create a GIF.');
                    return;
                }
                if (isNaN(delay) || delay < 50) {
                    alert('Please enter a valid frame delay (minimum 50ms).');
                    return;
                }

                gifPreview.style.display = 'none';
                downloadLink.style.display = 'none';

                const gif = new GIF({
                    workers: 2,
                    quality: 10,
                    workerScript: 'https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js'
                });

                let imagesLoaded = 0;
                const images = [];

                Array.from(files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const img = new Image();
                        img.onload = function() {
                            images.push(img);
                            imagesLoaded++;
                            if (imagesLoaded === files.length) {
                                // All images loaded, now add them to GIF
                                images.sort((a, b) => a.src.localeCompare(b.src)); // Sort by name
                                images.forEach(img => {
                                    gif.addFrame(img, { delay: delay });
                                });
                                gif.render();
                            }
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                });

                gif.on('finished', function(blob) {
                    const url = URL.createObjectURL(blob);
                    previewImage.src = url;
                    downloadAnchor.href = url;
                    gifPreview.style.display = 'block';
                    downloadLink.style.display = 'block';
                });

                gif.on('progress', function(p) {
                    console.log('GIF generation progress:', p);
                });
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screenshot to PDF Converter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">Screenshot to PDF Converter</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Screenshot to PDF Converter Functionality</h5>
                <input type="file" class="form-control" id="imageUpload" accept="image/*" multiple>
                <button class="btn btn-primary mt-3" id="convertToPdfBtn">Convert to PDF</button>
                <div class="mt-3" id="downloadLink" style="display:none;">
                    <a href="#" id="downloadAnchor" download="screenshots.pdf" class="btn btn-success">Download PDF</a>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const imageUpload = document.getElementById('imageUpload');
            const convertToPdfBtn = document.getElementById('convertToPdfBtn');
            const downloadLink = document.getElementById('downloadLink');
            const downloadAnchor = document.getElementById('downloadAnchor');

            convertToPdfBtn.addEventListener('click', function() {
                const files = imageUpload.files;
                if (files.length === 0) {
                    alert('Please select one or more images to convert to PDF.');
                    return;
                }

                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                let imagesProcessed = 0;

                Array.from(files).forEach((file, index) => {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const img = new Image();
                        img.onload = function() {
                            const imgWidth = 180; // A4 width approx
                            const imgHeight = (img.height * imgWidth) / img.width;

                            if (index > 0) {
                                doc.addPage();
                            }
                            doc.addImage(img.src, 'PNG', 10, 10, imgWidth, imgHeight);

                            imagesProcessed++;
                            if (imagesProcessed === files.length) {
                                const pdfBlob = doc.output('blob');
                                const url = URL.createObjectURL(pdfBlob);
                                downloadAnchor.href = url;
                                downloadLink.style.display = 'block';
                            }
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                });
            });
        });
    </script>
</body>
</html>

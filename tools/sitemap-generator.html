<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sitemap Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">Sitemap Generator</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Sitemap Generator Functionality</h5>
                <p class="card-text">Generate an XML sitemap for your website to help search engines crawl and index your pages more efficiently.</p>
                <div class="mb-3">
                    <label for="urlInput" class="form-label">Website URL (e.g., https://www.example.com)</label>
                    <input type="url" class="form-control" id="urlInput" placeholder="Enter your website URL" required>
                </div>
                <div class="mb-3">
                    <label for="lastModInput" class="form-label">Last Modified Date (optional)</label>
                    <input type="date" class="form-control" id="lastModInput">
                </div>
                <div class="mb-3">
                    <label for="changeFreqSelect" class="form-label">Change Frequency</label>
                    <select class="form-select" id="changeFreqSelect">
                        <option value="always">Always</option>
                        <option value="hourly">Hourly</option>
                        <option value="daily" selected>Daily</option>
                        <option value="weekly">Weekly</option>
                        <option value="monthly">Monthly</option>
                        <option value="yearly">Yearly</option>
                        <option value="never">Never</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="priorityInput" class="form-label">Priority (0.0 - 1.0)</label>
                    <input type="number" class="form-control" id="priorityInput" min="0.0" max="1.0" step="0.1" value="0.8">
                </div>
                <button id="generateSitemapBtn" class="btn btn-primary">Generate Sitemap</button>
                <div class="mt-4">
                    <label for="sitemapOutput" class="form-label">Generated Sitemap XML</label>
                    <textarea class="form-control" id="sitemapOutput" rows="10" readonly></textarea>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        // JavaScript for Sitemap Generator tool
        document.addEventListener('DOMContentLoaded', function() {
            const urlInput = document.getElementById('urlInput');
            const lastModInput = document.getElementById('lastModInput');
            const changeFreqSelect = document.getElementById('changeFreqSelect');
            const priorityInput = document.getElementById('priorityInput');
            const generateSitemapBtn = document.getElementById('generateSitemapBtn');
            const sitemapOutput = document.getElementById('sitemapOutput');

            generateSitemapBtn.addEventListener('click', generateSitemap);

            function generateSitemap() {
                const url = urlInput.value.trim();
                if (!url) {
                    sitemapOutput.value = 'Please enter a valid URL.';
                    return;
                }

                let sitemapXml = '<?xml version="1.0" encoding="UTF-8"?>\n';
                sitemapXml += '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n';

                sitemapXml += '  <url>\n';
                sitemapXml += `    <loc>${url}</loc>\n`;

                const lastMod = lastModInput.value;
                if (lastMod) {
                    sitemapXml += `    <lastmod>${lastMod}</lastmod>\n`;
                }

                const changeFreq = changeFreqSelect.value;
                sitemapXml += `    <changefreq>${changeFreq}</changefreq>\n`;

                const priority = parseFloat(priorityInput.value);
                if (!isNaN(priority)) {
                    sitemapXml += `    <priority>${priority.toFixed(1)}</priority>\n`;
                }

                sitemapXml += '  </url>\n';
                sitemapXml += '</urlset>';

                sitemapOutput.value = sitemapXml;
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">URL Shortener</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">URL Shortener Functionality</h5>
                <div class="mb-3">
                    <label for="longUrl" class="form-label">Enter Long URL:</label>
                    <input type="url" class="form-control" id="longUrl" placeholder="e.g., https://www.example.com/very/long/url/path">
                </div>
                <div class="d-grid gap-2 d-md-block mb-3">
                    <button class="btn btn-primary me-2" id="shortenBtn"><i class="fas fa-cut"></i> Shorten URL</button>
                    <button class="btn btn-danger" id="clearBtn"><i class="fas fa-times"></i> Clear</button>
                </div>
                <div class="mt-4">
                    <h5>Shortened URL:</h5>
                    <div class="input-group">
                        <input type="text" class="form-control" id="shortenedUrl" readonly>
                        <button class="btn btn-info" id="copyBtn"><i class="fas fa-copy"></i> Copy</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const longUrlInput = document.getElementById('longUrl');
            const shortenBtn = document.getElementById('shortenBtn');
            const clearBtn = document.getElementById('clearBtn');
            const shortenedUrlInput = document.getElementById('shortenedUrl');
            const copyBtn = document.getElementById('copyBtn');

            // This is a placeholder for a real URL shortening API.
            // In a real application, you would integrate with a service like Bitly, TinyURL, etc.
            const shortenUrl = async (longUrl) => {
                // For demonstration, we'll just simulate a shortened URL.
                // In a real scenario, you'd make an API call here.
                if (!longUrl) {
                    return 'Please enter a URL.';
                }
                if (!longUrl.startsWith('http://') && !longUrl.startsWith('https://')) {
                    return 'Invalid URL. Please include http:// or https://';
                }
                const dummyShortUrl = 'https://short.url/' + Math.random().toString(36).substring(2, 8);
                return new Promise(resolve => setTimeout(() => resolve(dummyShortUrl), 500));
            };

            shortenBtn.addEventListener('click', async () => {
                const longUrl = longUrlInput.value.trim();
                shortenedUrlInput.value = 'Shortening...';
                const shortUrl = await shortenUrl(longUrl);
                shortenedUrlInput.value = shortUrl;
            });

            clearBtn.addEventListener('click', () => {
                longUrlInput.value = '';
                shortenedUrlInput.value = '';
            });

            copyBtn.addEventListener('click', () => {
                shortenedUrlInput.select();
                shortenedUrlInput.setSelectionRange(0, 99999);
                document.execCommand('copy');
                alert('Copied to clipboard!');
            });
        });
    </script>
</body>
</html>

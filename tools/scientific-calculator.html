<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">Scientific Calculator</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Scientific Calculator Functionality</h5>
                <div class="calculator card">
                    <div class="card-body">
                        <input type="text" class="calculator-screen form-control mb-3" id="display" value="" disabled>
                        <div class="calculator-keys">
                            <div class="row mb-2">
                                <button type="button" class="btn btn-secondary col mx-1" value="sqrt">√</button>
                                <button type="button" class="btn btn-secondary col mx-1" value="pow">x^y</button>
                                <button type="button" class="btn btn-secondary col mx-1" value="log">log</button>
                                <button type="button" class="btn btn-secondary col mx-1" value="sin">sin</button>
                            </div>
                            <div class="row mb-2">
                                <button type="button" class="btn btn-secondary col mx-1" value="cos">cos</button>
                                <button type="button" class="btn btn-secondary col mx-1" value="tan">tan</button>
                                <button type="button" class="btn btn-secondary col mx-1" value="pi">π</button>
                                <button type="button" class="btn btn-secondary col mx-1" value="e">e</button>
                            </div>
                            <div class="row mb-2">
                                <button type="button" class="btn btn-light col mx-1" value="7">7</button>
                                <button type="button" class="btn btn-light col mx-1" value="8">8</button>
                                <button type="button" class="btn btn-light col mx-1" value="9">9</button>
                                <button type="button" class="btn btn-info col mx-1" value="/">÷</button>
                            </div>
                            <div class="row mb-2">
                                <button type="button" class="btn btn-light col mx-1" value="4">4</button>
                                <button type="button" class="btn btn-light col mx-1" value="5">5</button>
                                <button type="button" class="btn btn-light col mx-1" value="6">6</button>
                                <button type="button" class="btn btn-info col mx-1" value="*">×</button>
                            </div>
                            <div class="row mb-2">
                                <button type="button" class="btn btn-light col mx-1" value="1">1</button>
                                <button type="button" class="btn btn-light col mx-1" value="2">2</button>
                                <button type="button" class="btn btn-light col mx-1" value="3">3</button>
                                <button type="button" class="btn btn-info col mx-1" value="-">-</button>
                            </div>
                            <div class="row mb-2">
                                <button type="button" class="btn btn-light col mx-1" value="0">0</button>
                                <button type="button" class="btn btn-light col mx-1" value=".">.</button>
                                <button type="button" class="btn btn-warning col mx-1" value="all-clear">AC</button>
                                <button type="button" class="btn btn-info col mx-1" value="+">+</button>
                            </div>
                            <div class="row">
                                <button type="button" class="btn btn-success col mx-1" value="=">=</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const display = document.getElementById('display');
            const calculator = document.querySelector('.calculator-keys');
            let currentInput = '';
            let operator = null;
            let firstOperand = null;
            let waitingForSecondOperand = false;

            calculator.addEventListener('click', (event) => {
                const { target } = event;
                const { value } = target;

                if (!target.matches('button')) {
                    return;
                }

                switch (value) {
                    case '+':
                    case '-':
                    case '*':
                    case '/':
                        handleOperator(value);
                        break;
                    case '=':
                        calculate();
                        break;
                    case 'all-clear':
                        clearCalculator();
                        break;
                    case 'sqrt':
                    case 'pow':
                    case 'log':
                    case 'sin':
                    case 'cos':
                    case 'tan':
                        handleScientificFunction(value);
                        break;
                    case 'pi':
                    case 'e':
                        handleConstant(value);
                        break;
                    default:
                        inputDigit(value);
                        break;
                }
                updateDisplay();
            });

            function inputDigit(digit) {
                if (waitingForSecondOperand === true) {
                    currentInput = digit;
                    waitingForSecondOperand = false;
                } else {
                    currentInput = currentInput === '0' ? digit : currentInput + digit;
                }
            }

            function updateDisplay() {
                display.value = currentInput;
            }

            function handleOperator(nextOperator) {
                const inputValue = parseFloat(currentInput);

                if (operator && waitingForSecondOperand) {
                    operator = nextOperator;
                    return;
                }

                if (firstOperand === null) {
                    firstOperand = inputValue;
                } else if (operator) {
                    const result = performCalculation[operator](firstOperand, inputValue);
                    currentInput = String(result);
                    firstOperand = result;
                }

                waitingForSecondOperand = true;
                operator = nextOperator;
            }

            const performCalculation = {
                '/': (firstOperand, secondOperand) => firstOperand / secondOperand,
                '*': (firstOperand, secondOperand) => firstOperand * secondOperand,
                '+': (firstOperand, secondOperand) => firstOperand + secondOperand,
                '-': (firstOperand, secondOperand) => firstOperand - secondOperand,
            };

            function calculate() {
                if (operator === null || waitingForSecondOperand) {
                    return;
                }

                const inputValue = parseFloat(currentInput);
                const result = performCalculation[operator](firstOperand, inputValue);

                currentInput = String(result);
                firstOperand = null;
                operator = null;
                waitingForSecondOperand = false;
            }

            function clearCalculator() {
                currentInput = '';
                firstOperand = null;
                operator = null;
                waitingForSecondOperand = false;
                updateDisplay();
            }

            function handleScientificFunction(func) {
                const inputValue = parseFloat(currentInput);
                if (isNaN(inputValue)) return;

                let result;
                switch (func) {
                    case 'sqrt':
                        result = Math.sqrt(inputValue);
                        break;
                    case 'pow':
                        // For x^y, we need a second operand. This will be handled differently.
                        // For now, let's assume it's x^2 if no second operand is provided.
                        // A more robust implementation would require a separate input for y.
                        result = Math.pow(inputValue, 2);
                        break;
                    case 'log':
                        result = Math.log10(inputValue);
                        break;
                    case 'sin':
                        result = Math.sin(inputValue * Math.PI / 180); // Convert to radians
                        break;
                    case 'cos':
                        result = Math.cos(inputValue * Math.PI / 180); // Convert to radians
                        break;
                    case 'tan':
                        result = Math.tan(inputValue * Math.PI / 180); // Convert to radians
                        break;
                }
                currentInput = String(result);
                firstOperand = result;
                operator = null;
                waitingForSecondOperand = false;
            }

            function handleConstant(constant) {
                if (waitingForSecondOperand === true) {
                    currentInput = '';
                    waitingForSecondOperand = false;
                }
                switch (constant) {
                    case 'pi':
                        currentInput = String(Math.PI);
                        break;
                    case 'e':
                        currentInput = String(Math.E);
                        break;
                }
            }
        });
    </script>
</body>
</html>

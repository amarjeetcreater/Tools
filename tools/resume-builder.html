<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Builder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">Resume Builder</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Build Your Professional Resume</h5>
                <form id="resumeForm">
                    <!-- Personal Information -->
                    <div class="mb-3">
                        <label for="fullName" class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="fullName" placeholder="John Doe" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" placeholder="john.doe@example.com" required>
                    </div>
                    <div class="mb-3">
                        <label for="phone" class="form-label">Phone</label>
                        <input type="tel" class="form-control" id="phone" placeholder="+1234567890">
                    </div>
                    <div class="mb-3">
                        <label for="linkedin" class="form-label">LinkedIn Profile</label>
                        <input type="url" class="form-control" id="linkedin" placeholder="https://linkedin.com/in/johndoe">
                    </div>
                    <div class="mb-3">
                        <label for="portfolio" class="form-label">Portfolio/Website</label>
                        <input type="url" class="form-control" id="portfolio" placeholder="https://johndoe.com">
                    </div>

                    <!-- Summary/Objective -->
                    <div class="mb-3">
                        <label for="summary" class="form-label">Summary/Objective</label>
                        <textarea class="form-control" id="summary" rows="4" placeholder="A brief overview of your professional goals and experience."></textarea>
                    </div>

                    <!-- Education Section -->
                    <div class="mb-3">
                        <label for="education" class="form-label">Education (e.g., Degree, University, Year)</label>
                        <textarea class="form-control" id="education" rows="3" placeholder="B.S. in Computer Science, University of Example, 2020"></textarea>
                    </div>

                    <!-- Experience Section -->
                    <div class="mb-3">
                        <label for="experience" class="form-label">Experience (e.g., Job Title, Company, Dates, Responsibilities)</label>
                        <textarea class="form-control" id="experience" rows="5" placeholder="Software Engineer, Tech Solutions Inc., 2020-Present\n- Developed and maintained web applications."></textarea>
                    </div>

                    <!-- Skills Section -->
                    <div class="mb-3">
                        <label for="skills" class="form-label">Skills (Comma-separated)</label>
                        <input type="text" class="form-control" id="skills" placeholder="JavaScript, React, Node.js, HTML, CSS">
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary" id="generateResume">Generate Resume</button>
                        <button type="button" class="btn btn-secondary" id="clearForm">Clear Form</button>
                    </div>
                </form>

                <div id="resumeOutput" class="mt-4" style="display: none;">
                    <h5>Generated Resume Preview</h5>
                    <div id="resumeContent" class="border p-3 mb-3" style="white-space: pre-wrap; font-family: monospace;"></div>
                    <button class="btn btn-success" id="downloadResume">Download Resume (PDF)</button>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        // JavaScript for Resume Builder tool
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Resume Builder loaded.');

            const resumeForm = document.getElementById('resumeForm');
            const generateResumeBtn = document.getElementById('generateResume');
            const clearFormBtn = document.getElementById('clearForm');
            const resumeOutputDiv = document.getElementById('resumeOutput');
            const resumeContentDiv = document.getElementById('resumeContent');
            const downloadResumeBtn = document.getElementById('downloadResume');

            generateResumeBtn.addEventListener('click', function(event) {
                event.preventDefault();
                generateResume();
            });

            clearFormBtn.addEventListener('click', function() {
                resumeForm.reset();
                resumeOutputDiv.style.display = 'none';
                resumeContentDiv.innerHTML = '';
            });

            downloadResumeBtn.addEventListener('click', function() {
                downloadResume();
            });

            function generateResume() {
                const fullName = document.getElementById('fullName').value;
                const email = document.getElementById('email').value;
                const phone = document.getElementById('phone').value;
                const linkedin = document.getElementById('linkedin').value;
                const portfolio = document.getElementById('portfolio').value;
                const summary = document.getElementById('summary').value;
                const education = document.getElementById('education').value;
                const experience = document.getElementById('experience').value;
                const skills = document.getElementById('skills').value;

                let resumeText = '';

                if (fullName) resumeText += `Full Name: ${fullName}\n`;
                if (email) resumeText += `Email: ${email}\n`;
                if (phone) resumeText += `Phone: ${phone}\n`;
                if (linkedin) resumeText += `LinkedIn: ${linkedin}\n`;
                if (portfolio) resumeText += `Portfolio: ${portfolio}\n`;
                if (resumeText) resumeText += `\n`;

                if (summary) resumeText += `SUMMARY/OBJECTIVE:\n${summary}\n\n`;
                if (education) resumeText += `EDUCATION:\n${education}\n\n`;
                if (experience) resumeText += `EXPERIENCE:\n${experience}\n\n`;
                if (skills) resumeText += `SKILLS:\n${skills}\n\n`;

                resumeContentDiv.textContent = resumeText.trim();
                resumeOutputDiv.style.display = 'block';
            }

            function downloadResume() {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();

                const content = resumeContentDiv.textContent;
                const lines = doc.splitTextToSize(content, 180); // Max width 180mm

                let y = 10;
                const lineHeight = 7;
                const pageHeight = doc.internal.pageSize.height;

                lines.forEach(line => {
                    if (y + lineHeight > pageHeight - 10) { // Check if content exceeds page height
                        doc.addPage();
                        y = 10; // Reset Y for new page
                    }
                    doc.text(line, 10, y);
                    y += lineHeight;
                });

                doc.save('resume.pdf');
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="container mt-5">
        <div class="card shadow-lg rounded-lg">
            <div class="card-header bg-primary text-white text-center">
                <h1 class="mb-0">Unit Converter</h1>
            </div>
            <div class="card-body p-4">
                <div class="form-group">
                    <label for="conversionType">Select Conversion Type:</label>
                    <select class="form-control" id="conversionType">
                        <option value="length">Length</option>
                        <option value="weight">Weight</option>
                        <option value="volume">Volume</option>
                        <option value="temperature">Temperature</option>
                        <option value="speed">Speed</option>
                        <option value="pressure">Pressure</option>
                        <option value="energy">Energy</option>
                        <option value="dataStorage">Data Storage</option>
                        <option value="fuelEfficiency">Fuel Efficiency</option>
                        <option value="angle">Angle</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="inputValue">Value:</label>
                    <input type="number" class="form-control" id="inputValue" placeholder="Enter value">
                </div>

                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label for="fromUnit">From Unit:</label>
                        <select class="form-control" id="fromUnit"></select>
                    </div>
                    <div class="form-group col-md-6">
                        <label for="toUnit">To Unit:</label>
                        <select class="form-control" id="toUnit"></select>
                    </div>
                </div>

                <div class="d-flex justify-content-center mb-3">
                    <button class="btn btn-success btn-lg mr-2" id="convertBtn"><i class="fas fa-exchange-alt"></i> Convert</button>
                    <button class="btn btn-danger btn-lg" id="clearBtn"><i class="fas fa-times"></i> Clear</button>
                </div>

                <div class="form-group result-group">
                    <label for="resultValue">Converted Value:</label>
                    <div class="input-group">
                        <input type="text" class="form-control" id="resultValue" readonly>
                        <div class="input-group-append">
                            <button class="btn btn-outline-secondary copy-btn" type="button" data-target="resultValue"><i class="fas fa-copy"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const conversionTypeSelect = document.getElementById('conversionType');
            const inputValueInput = document.getElementById('inputValue');
            const fromUnitSelect = document.getElementById('fromUnit');
            const toUnitSelect = document.getElementById('toUnit');
            const convertBtn = document.getElementById('convertBtn');
            const clearBtn = document.getElementById('clearBtn');
            const resultValueInput = document.getElementById('resultValue');
            const copyButtons = document.querySelectorAll('.copy-btn');

            const units = {
                length: {
                    'meter': 1,
                    'kilometer': 1000,
                    'centimeter': 0.01,
                    'millimeter': 0.001,
                    'micrometer': 0.000001,
                    'nanometer': 0.000000001,
                    'mile': 1609.34,
                    'yard': 0.9144,
                    'foot': 0.3048,
                    'inch': 0.0254,
                    'nautical mile': 1852
                },
                weight: {
                    'kilogram': 1,
                    'gram': 0.001,
                    'milligram': 0.000001,
                    'metric ton': 1000,
                    'pound': 0.453592,
                    'ounce': 0.0283495
                },
                volume: {
                    'liter': 1,
                    'milliliter': 0.001,
                    'cubic meter': 1000,
                    'cubic centimeter': 0.001,
                    'gallon (US)': 3.78541,
                    'quart (US)': 0.946353,
                    'pint (US)': 0.473176,
                    'cup (US)': 0.236588,
                    'fluid ounce (US)': 0.0295735
                },
                temperature: {
                    'celsius': { toKelvin: (c) => c + 273.15, fromKelvin: (k) => k - 273.15 },
                    'fahrenheit': { toKelvin: (f) => (f - 32) * 5/9 + 273.15, fromKelvin: (k) => (k - 273.15) * 9/5 + 32 },
                    'kelvin': { toKelvin: (k) => k, fromKelvin: (k) => k }
                },
                speed: {
                    'meter/second': 1,
                    'kilometer/hour': 0.277778,
                    'mile/hour': 0.44704,
                    'knot': 0.514444,
                    'foot/second': 0.3048
                },
                pressure: {
                    'pascal': 1,
                    'kilopascal': 1000,
                    'bar': 100000,
                    'psi': 6894.76,
                    'atmosphere': 101325,
                    'mmHg': 133.322
                },
                energy: {
                    'joule': 1,
                    'kilojoule': 1000,
                    'calorie': 4.184,
                    'kilocalorie': 4184,
                    'kilowatt-hour': 3600000,
                    'electronvolt': 1.60218e-19
                },
                dataStorage: {
                    'bit': 1,
                    'byte': 8,
                    'kilobit': 1000,
                    'kilobyte': 8000,
                    'megabit': 1000000,
                    'megabyte': 8000000,
                    'gigabit': 1000000000,
                    'gigabyte': 8000000000,
                    'terabit': 1000000000000,
                    'terabyte': 8000000000000
                },
                fuelEfficiency: {
                    'km/liter': 1,
                    'miles/gallon (US)': 0.425144,
                    'miles/gallon (UK)': 0.354006,
                    'liter/100 km': 100
                },
                angle: {
                    'degree': 1,
                    'radian': 57.2958,
                    'gradian': 0.9
                }
            };

            const populateUnits = (type) => {
                fromUnitSelect.innerHTML = '';
                toUnitSelect.innerHTML = '';
                for (const unit in units[type]) {
                    const option1 = document.createElement('option');
                    option1.value = unit;
                    option1.textContent = unit.charAt(0).toUpperCase() + unit.slice(1);
                    fromUnitSelect.appendChild(option1);

                    const option2 = document.createElement('option');
                    option2.value = unit;
                    option2.textContent = unit.charAt(0).toUpperCase() + unit.slice(1);
                    toUnitSelect.appendChild(option2);
                }
                // Set default selections
                if (fromUnitSelect.options.length > 0) {
                    fromUnitSelect.value = Object.keys(units[type])[0];
                    if (toUnitSelect.options.length > 1) {
                        toUnitSelect.value = Object.keys(units[type])[1];
                    } else {
                        toUnitSelect.value = Object.keys(units[type])[0];
                    }
                }
            };

            conversionTypeSelect.addEventListener('change', (event) => {
                populateUnits(event.target.value);
                resultValueInput.value = '';
            });

            convertBtn.addEventListener('click', () => {
                const type = conversionTypeSelect.value;
                const inputValue = parseFloat(inputValueInput.value);
                const fromUnit = fromUnitSelect.value;
                const toUnit = toUnitSelect.value;

                if (isNaN(inputValue)) {
                    alert('Please enter a valid number for the value.');
                    return;
                }

                let convertedValue;

                if (type === 'temperature') {
                    const fromKelvin = units[type][fromUnit].toKelvin(inputValue);
                    convertedValue = units[type][toUnit].fromKelvin(fromKelvin);
                } else if (type === 'fuelEfficiency') {
                    // Special handling for fuel efficiency as it's not a direct linear conversion for all units
                    // Convert everything to a base (e.g., km/liter) then to target
                    let baseValue;
                    if (fromUnit === 'km/liter') {
                        baseValue = inputValue;
                    } else if (fromUnit === 'miles/gallon (US)') {
                        baseValue = inputValue * 0.425144; // Convert to km/liter
                    } else if (fromUnit === 'miles/gallon (UK)') {
                        baseValue = inputValue * 0.354006; // Convert to km/liter
                    } else if (fromUnit === 'liter/100 km') {
                        baseValue = 100 / inputValue; // Convert to km/liter
                    }

                    if (toUnit === 'km/liter') {
                        convertedValue = baseValue;
                    } else if (toUnit === 'miles/gallon (US)') {
                        convertedValue = baseValue / 0.425144;
                    } else if (toUnit === 'miles/gallon (UK)') {
                        convertedValue = baseValue / 0.354006;
                    } else if (toUnit === 'liter/100 km') {
                        convertedValue = 100 / baseValue;
                    }
                } else {
                    const fromFactor = units[type][fromUnit];
                    const toFactor = units[type][toUnit];
                    convertedValue = (inputValue * fromFactor) / toFactor;
                }

                resultValueInput.value = convertedValue.toFixed(6);
            });

            clearBtn.addEventListener('click', () => {
                inputValueInput.value = '';
                resultValueInput.value = '';
                populateUnits(conversionTypeSelect.value);
            });

            copyButtons.forEach(button => {
                button.addEventListener('click', (event) => {
                    const targetId = event.currentTarget.dataset.target;
                    const targetInput = document.getElementById(targetId);
                    targetInput.select();
                    document.execCommand('copy');
                    alert('Copied to clipboard!');
                });
            });

            // Initial population of units
            populateUnits(conversionTypeSelect.value);
        });
    </script>
</body>
</html>

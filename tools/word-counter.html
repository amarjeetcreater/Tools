<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Counter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">Word Counter</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Word Counter Functionality</h5>
                <div class="mb-3">
                    <label for="textInput" class="form-label">Enter your text:</label>
                    <textarea class="form-control" id="textInput" rows="10" placeholder="Type or paste your text here..."></textarea>
                </div>
                <div class="mt-3">
                    <p>Words: <span id="wordCount" class="fw-bold">0</span></p>
                    <p>Characters: <span id="charCount" class="fw-bold">0</span></p>
                    <p>Sentences: <span id="sentenceCount" class="fw-bold">0</span></p>
                    <p>Paragraphs: <span id="paragraphCount" class="fw-bold">0</span></p>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const textInput = document.getElementById('textInput');
            const wordCount = document.getElementById('wordCount');
            const charCount = document.getElementById('charCount');
            const sentenceCount = document.getElementById('sentenceCount');
            const paragraphCount = document.getElementById('paragraphCount');

            textInput.addEventListener('input', function() {
                const text = textInput.value;

                // Character count (including spaces)
                charCount.textContent = text.length;

                // Word count
                const words = text.match(/\b\w+\b/g);
                wordCount.textContent = words ? words.length : 0;

                // Sentence count (basic)
                const sentences = text.split(/[.!?]+\s*/).filter(s => s.trim().length > 0);
                sentenceCount.textContent = sentences.length;

                // Paragraph count
                const paragraphs = text.split(/\n\s*\n/g).filter(p => p.trim().length > 0);
                paragraphCount.textContent = paragraphs.length;
            });
        });
    </script>
</body>
</html>

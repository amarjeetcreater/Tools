<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Video Downloader</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">TikTok Video Downloader</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">TikTok Video Downloader</h5>
                <div class="mb-3">
                    <label for="tiktokUrl" class="form-label">TikTok Video URL</label>
                    <input type="text" class="form-control" id="tiktokUrl" placeholder="https://www.tiktok.com/@username/video/1234567890">
                </div>
                <button id="getVideoBtn" class="btn btn-primary me-2">Get Video</button>
                <button id="clearBtn" class="btn btn-secondary">Clear</button>
                
                <div id="videoContainer" class="mt-4 d-none">
                    <video id="tiktokVideo" controls class="w-100"></video>
                    <div class="mt-3">
                        <button id="downloadBtn" class="btn btn-success">Download Video</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        // JavaScript for TikTok Video Downloader tool
        document.addEventListener('DOMContentLoaded', function() {
            console.log('TikTok Video Downloader loaded.');
            // Implement tool-specific JavaScript here
            const getVideoBtn = document.getElementById('getVideoBtn');
            const clearBtn = document.getElementById('clearBtn');
            const tiktokUrl = document.getElementById('tiktokUrl');
            const videoContainer = document.getElementById('videoContainer');
            const tiktokVideo = document.getElementById('tiktokVideo');
            const downloadBtn = document.getElementById('downloadBtn');
            
            getVideoBtn.addEventListener('click', async () => {
                const url = tiktokUrl.value.trim();
                if (!url) {
                    alert('Please enter a TikTok video URL');
                    return;
                }
                
                try {
                    // Using a proxy to bypass CORS
                    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://www.tikwm.com/api/?url=${url}`)}`;
                    const response = await fetch(proxyUrl);
                    const data = await response.json();
                    
                    if (data.code === 0 && data.data.play) {
                        tiktokVideo.src = data.data.play;
                        videoContainer.classList.remove('d-none');
                        
                        // Set up download button
                        downloadBtn.onclick = () => {
                            const a = document.createElement('a');
                            a.href = data.data.play;
                            a.download = 'tiktok-video.mp4';
                            a.click();
                        };
                    } else {
                        alert('Failed to fetch video. Please check the URL and try again.');
                    }
                } catch (error) {
                    console.error('Error fetching TikTok video:', error);
                    alert('An error occurred. Please try again later.');
                }
            });
            
            clearBtn.addEventListener('click', () => {
                tiktokUrl.value = '';
                videoContainer.classList.add('d-none');
            });
        });
    </script>
</body>
</html>

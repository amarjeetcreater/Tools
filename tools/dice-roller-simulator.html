<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Roller Simulator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">Dice Roller Simulator</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Roll the Dice!</h5>
                <div class="mb-3">
                    <label for="numDice" class="form-label">Number of Dice:</label>
                    <input type="number" class="form-control" id="numDice" value="1" min="1" max="6">
                </div>
                <div class="d-grid gap-2">
                    <button type="button" class="btn btn-primary" id="rollDiceBtn">Roll Dice</button>
                </div>
                <div class="mt-4 text-center">
                    <h6>Results:</h6>
                    <div id="diceContainer" class="d-flex justify-content-center flex-wrap mb-3"></div>
                    <p class="fs-4 fw-bold">Total: <span id="totalResult">0</span></p>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        // JavaScript for Dice Roller Simulator tool
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Dice Roller Simulator loaded.');

            const numDiceInput = document.getElementById('numDice');
            const rollDiceBtn = document.getElementById('rollDiceBtn');
            const diceContainer = document.getElementById('diceContainer');
            const totalResultSpan = document.getElementById('totalResult');

            const diceImages = {
                1: 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/1b/Dice-1-b.svg/60px-Dice-1-b.svg.png',
                2: 'https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Dice-2-b.svg/60px-Dice-2-b.svg.png',
                3: 'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b1/Dice-3-b.svg/60px-Dice-3-b.svg.png',
                4: 'https://upload.wikimedia.org/wikipedia/commons/thumb/f/fd/Dice-4-b.svg/60px-Dice-4-b.svg.png',
                5: 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/08/Dice-5-b.svg/60px-Dice-5-b.svg.png',
                6: 'https://upload.wikimedia.org/wikipedia/commons/thumb/2/26/Dice-6-b.svg/60px-Dice-6-b.svg.png'
            };

            rollDiceBtn.addEventListener('click', rollDice);

            function rollDice() {
                diceContainer.innerHTML = '';
                let total = 0;
                const numDice = parseInt(numDiceInput.value);

                if (isNaN(numDice) || numDice <= 0) {
                    alert('Please enter a valid number of dice.');
                    return;
                }

                for (let i = 0; i < numDice; i++) {
                    const roll = Math.floor(Math.random() * 6) + 1; // Random number between 1 and 6
                    total += roll;

                    const diceImg = document.createElement('img');
                    diceImg.src = diceImages[roll];
                    diceImg.alt = `Dice ${roll}`;
                    diceImg.classList.add('m-2');
                    diceImg.style.width = '60px';
                    diceImg.style.height = '60px';
                    diceContainer.appendChild(diceImg);
                }
                totalResultSpan.textContent = total;
            }
        });
    </script>
</body>
</html>

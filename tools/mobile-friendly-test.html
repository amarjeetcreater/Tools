<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile-Friendly Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">Mobile-Friendly Test</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Mobile-Friendly Test Functionality</h5>
                <p class="card-text">Enter a URL to check its mobile-friendliness.</p>
                <div class="mb-3">
                    <label for="urlInput" class="form-label">URL:</label>
                    <input type="url" class="form-control" id="urlInput" placeholder="https://example.com">
                </div>
                <button class="btn btn-primary" id="runTestBtn">Run Mobile-Friendly Test</button>
                <div class="mt-3" id="resultsDisplay">
                    <!-- Results will be displayed here -->
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        // JavaScript for Mobile-Friendly Test tool
        document.addEventListener('DOMContentLoaded', function() {
            const urlInput = document.getElementById('urlInput');
            const runTestBtn = document.getElementById('runTestBtn');
            const resultsDisplay = document.getElementById('resultsDisplay');

            runTestBtn.addEventListener('click', function() {
                const url = urlInput.value.trim();
                if (url) {
                    resultsDisplay.innerHTML = `<p>Running mobile-friendly test for: <strong>${url}</strong>...</p>`;
                    // Simulate mobile-friendly test
                    setTimeout(() => {
                        const isMobileFriendly = Math.random() > 0.2; // 80% chance of being mobile-friendly
                        if (isMobileFriendly) {
                            resultsDisplay.innerHTML = `
                                <div class="alert alert-success" role="alert">
                                    <h4 class="alert-heading">Page is Mobile-Friendly!</h4>
                                    <p>This page is easy to use on a mobile device.</p>
                                    <hr>
                                    <p class="mb-0"><em>(Note: This is a simulated result. Real mobile-friendly testing requires external APIs or tools.)</em></p>
                                </div>
                            `;
                        } else {
                            const reasons = [
                                "Content wider than screen",
                                "Text too small to read",
                                "Clickable elements too close together",
                                "Uses incompatible plugins"
                            ];
                            const randomReason = reasons[Math.floor(Math.random() * reasons.length)];
                            resultsDisplay.innerHTML = `
                                <div class="alert alert-danger" role="alert">
                                    <h4 class="alert-heading">Page is NOT Mobile-Friendly!</h4>
                                    <p>This page is not easy to use on a mobile device. Reason: ${randomReason}</p>
                                    <hr>
                                    <p class="mb-0"><em>(Note: This is a simulated result. Real mobile-friendly testing requires external APIs or tools.)</em></p>
                                </div>
                            `;
                        }
                    }, 2000);
                } else {
                    resultsDisplay.innerHTML = '<p class="text-danger">Please enter a valid URL.</p>';
                }
            });
        });
    </script>
</body>
</html>

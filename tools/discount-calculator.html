<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discount Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">Discount Calculator</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Discount Calculator Functionality</h5>
                <div class="mb-3">
                    <label for="originalPrice" class="form-label">Original Price:</label>
                    <input type="number" class="form-control" id="originalPrice" placeholder="e.g., 100.00">
                </div>
                <div class="mb-3">
                    <label for="discountPercentage" class="form-label">Discount Percentage (%):</label>
                    <input type="number" class="form-control" id="discountPercentage" placeholder="e.g., 15">
                </div>
                <div class="d-grid gap-2 d-md-block mb-3">
                    <button class="btn btn-primary me-2" id="calculateBtn"><i class="fas fa-calculator"></i> Calculate Discount</button>
                    <button class="btn btn-danger" id="clearBtn"><i class="fas fa-trash"></i> Clear</button>
                </div>
                <div class="mt-4">
                    <h5>Discounted Price:</h5>
                    <div class="input-group mb-3">
                        <input type="text" class="form-control" id="discountedPrice" readonly>
                        <button class="btn btn-info" id="copyDiscountedPriceBtn"><i class="fas fa-copy"></i> Copy</button>
                    </div>
                    <h5>You Saved:</h5>
                    <div class="input-group">
                        <input type="text" class="form-control" id="youSaved" readonly>
                        <button class="btn btn-info" id="copyYouSavedBtn"><i class="fas fa-copy"></i> Copy</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const originalPriceInput = document.getElementById('originalPrice');
            const discountPercentageInput = document.getElementById('discountPercentage');
            const calculateBtn = document.getElementById('calculateBtn');
            const clearBtn = document.getElementById('clearBtn');
            const discountedPriceInput = document.getElementById('discountedPrice');
            const youSavedInput = document.getElementById('youSaved');
            const copyDiscountedPriceBtn = document.getElementById('copyDiscountedPriceBtn');
            const copyYouSavedBtn = document.getElementById('copyYouSavedBtn');

            calculateBtn.addEventListener('click', () => {
                const originalPrice = parseFloat(originalPriceInput.value);
                const discountPercentage = parseFloat(discountPercentageInput.value);

                if (isNaN(originalPrice) || isNaN(discountPercentage) || originalPrice < 0 || discountPercentage < 0 || discountPercentage > 100) {
                    discountedPriceInput.value = 'Invalid input';
                    youSavedInput.value = 'Invalid input';
                    return;
                }

                const discountAmount = originalPrice * (discountPercentage / 100);
                const discountedPrice = originalPrice - discountAmount;

                discountedPriceInput.value = `₹${discountedPrice.toFixed(2)}`;
                youSavedInput.value = `₹${discountAmount.toFixed(2)}`;
            });

            copyDiscountedPriceBtn.addEventListener('click', () => {
                discountedPriceInput.select();
                discountedPriceInput.setSelectionRange(0, 99999);
                document.execCommand('copy');
                alert('Copied discounted price to clipboard!');
            });

            copyYouSavedBtn.addEventListener('click', () => {
                youSavedInput.select();
                youSavedInput.setSelectionRange(0, 99999);
                document.execCommand('copy');
                alert('Copied savings to clipboard!');
            });

            clearBtn.addEventListener('click', () => {
                originalPriceInput.value = '';
                discountPercentageInput.value = '';
                discountedPriceInput.value = '';
                youSavedInput.value = '';
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML to Markdown Converter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">HTML to Markdown Converter</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">HTML to Markdown Converter Functionality</h5>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="htmlInput" class="form-label">Enter HTML:</label>
                        <textarea class="form-control" id="htmlInput" rows="15" placeholder="Type or paste your HTML here..."></textarea>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="markdownOutput" class="form-label">Markdown Output:</label>
                        <textarea class="form-control" id="markdownOutput" rows="15" readonly></textarea>
                    </div>
                </div>
                <div class="d-flex justify-content-center gap-2 mt-3">
                    <button class="btn btn-primary" id="convertBtn"><i class="fas fa-exchange-alt"></i> Convert to Markdown</button>
                    <button class="btn btn-secondary" id="copyBtn"><i class="fas fa-copy"></i> Copy Markdown</button>
                    <button class="btn btn-danger" id="clearBtn"><i class="fas fa-times"></i> Clear All</button>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turndown/7.1.2/turndown.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const htmlInput = document.getElementById('htmlInput');
            const markdownOutput = document.getElementById('markdownOutput');
            const convertBtn = document.getElementById('convertBtn');
            const copyBtn = document.getElementById('copyBtn');
            const clearBtn = document.getElementById('clearBtn');

            const turndownService = new TurndownService();

            const convertHtmlToMarkdown = () => {
                const html = htmlInput.value;
                const markdown = turndownService.turndown(html);
                markdownOutput.value = markdown;
            };

            convertBtn.addEventListener('click', convertHtmlToMarkdown);

            htmlInput.addEventListener('input', convertHtmlToMarkdown);

            copyBtn.addEventListener('click', () => {
                markdownOutput.select();
                markdownOutput.setSelectionRange(0, 99999); // For mobile devices
                document.execCommand('copy');
                alert('Markdown copied to clipboard!');
            });

            clearBtn.addEventListener('click', () => {
                htmlInput.value = '';
                markdownOutput.value = '';
            });
        });
    </script>
</body>
</html>

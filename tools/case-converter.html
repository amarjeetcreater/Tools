<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Converter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">Case Converter</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Case Converter Functionality</h5>
                <div class="mb-3">
                    <label for="textInput" class="form-label">Enter your text:</label>
                    <textarea class="form-control" id="textInput" rows="10" placeholder="Type or paste your text here..."></textarea>
                </div>
                <div class="d-grid gap-2 d-md-block mb-3">
                    <button class="btn btn-primary" id="upperCaseBtn">UPPER CASE</button>
                    <button class="btn btn-primary" id="lowerCaseBtn">lower case</button>
                    <button class="btn btn-primary" id="capitalizeCaseBtn">Capitalize Case</button>
                    <button class="btn btn-primary" id="sentenceCaseBtn">Sentence case</button>
                    <button class="btn btn-primary" id="titleCaseBtn">Title Case</button>
                    <button class="btn btn-primary" id="alternatingCaseBtn">aLtErNaTiNg cAsE</button>
                </div>
                <div class="mt-3">
                    <label for="output" class="form-label">Output:</label>
                    <textarea class="form-control" id="output" rows="10" readonly></textarea>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const textInput = document.getElementById('textInput');
            const output = document.getElementById('output');
            const upperCaseBtn = document.getElementById('upperCaseBtn');
            const lowerCaseBtn = document.getElementById('lowerCaseBtn');
            const capitalizeCaseBtn = document.getElementById('capitalizeCaseBtn');
            const sentenceCaseBtn = document.getElementById('sentenceCaseBtn');
            const titleCaseBtn = document.getElementById('titleCaseBtn');
            const alternatingCaseBtn = document.getElementById('alternatingCaseBtn');

            const updateOutput = (transformFunc) => {
                output.value = transformFunc(textInput.value);
            };

            upperCaseBtn.addEventListener('click', () => {
                updateOutput((text) => text.toUpperCase());
            });

            lowerCaseBtn.addEventListener('click', () => {
                updateOutput((text) => text.toLowerCase());
            });

            capitalizeCaseBtn.addEventListener('click', () => {
                updateOutput((text) => text.split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()).join(' '));
            });

            sentenceCaseBtn.addEventListener('click', () => {
                updateOutput((text) => {
                    return text.replace(/([a-z])([.?!]\s*)([a-z])/g, (match, p1, p2, p3) => p1 + p2 + p3.toUpperCase())
                               .replace(/(^|\.\s*|\!\s*|\?\s*)([a-z])/g, (match, p1, p2) => p1 + p2.toUpperCase());
                });
            });

            titleCaseBtn.addEventListener('click', () => {
                updateOutput((text) => {
                    return text.replace(/\w\S*/g, (txt) => {
                        return txt.charAt(0).toUpperCase() + txt.substr(1).toLowerCase();
                    });
                });
            });

            alternatingCaseBtn.addEventListener('click', () => {
                updateOutput((text) => {
                    return text.split('').map((char, index) => {
                        return index % 2 === 0 ? char.toLowerCase() : char.toUpperCase();
                    }).join('');
                });
            });

            textInput.addEventListener('input', () => {
                // Optionally, update output automatically on input change with a default case
                // For now, it only updates when a button is clicked.
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Rotator - Multi-Tools Website</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-5">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h1 class="mb-0">Image Rotator</h1>
            </div>
            <div class="card-body">
                <input type="file" class="form-control" id="imageUpload" accept="image/*">
                <div class="mt-3">
                    <label for="rotationAngle" class="form-label">Rotation Angle (degrees):</label>
                    <input type="number" class="form-control" id="rotationAngle" value="90">
                </div>
                <button class="btn btn-primary mt-3" id="rotateBtn">Rotate Image</button>
                <div class="mt-3">
                    <canvas id="imageCanvas" style="max-width: 100%; border: 1px solid #ccc; display: none;"></canvas>
                </div>
                <div class="mt-3" id="downloadLink" style="display:none;">
                    <a href="#" id="downloadAnchor" download="rotated-image.png" class="btn btn-success">Download Rotated Image</a>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const imageUpload = document.getElementById('imageUpload');
            const rotationAngleInput = document.getElementById('rotationAngle');
            const rotateBtn = document.getElementById('rotateBtn');
            const imageCanvas = document.getElementById('imageCanvas');
            const ctx = imageCanvas.getContext('2d');
            const downloadLink = document.getElementById('downloadLink');
            const downloadAnchor = document.getElementById('downloadAnchor');

            let originalImage = null;

            imageUpload.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        originalImage = new Image();
                        originalImage.onload = function() {
                            // Display original image on canvas initially
                            imageCanvas.width = originalImage.width;
                            imageCanvas.height = originalImage.height;
                            ctx.clearRect(0, 0, imageCanvas.width, imageCanvas.height);
                            ctx.drawImage(originalImage, 0, 0);
                            imageCanvas.style.display = 'block';
                            downloadLink.style.display = 'none';
                        };
                        originalImage.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            });

            rotateBtn.addEventListener('click', function() {
                if (!originalImage) {
                    alert('Please upload an image first.');
                    return;
                }

                const angle = parseInt(rotationAngleInput.value);
                if (isNaN(angle)) {
                    alert('Please enter a valid rotation angle.');
                    return;
                }

                const radians = angle * Math.PI / 180;

                // Calculate new dimensions for the rotated image to fit the canvas
                const sin = Math.abs(Math.sin(radians));
                const cos = Math.abs(Math.cos(radians));
                const newWidth = originalImage.width * cos + originalImage.height * sin;
                const newHeight = originalImage.width * sin + originalImage.height * cos;

                imageCanvas.width = newWidth;
                imageCanvas.height = newHeight;

                ctx.clearRect(0, 0, newWidth, newHeight);
                ctx.save();
                ctx.translate(newWidth / 2, newHeight / 2);
                ctx.rotate(radians);
                ctx.drawImage(originalImage, -originalImage.width / 2, -originalImage.height / 2);
                ctx.restore();

                imageCanvas.toBlob(function(blob) {
                    const url = URL.createObjectURL(blob);
                    downloadAnchor.href = url;
                    downloadLink.style.display = 'block';
                }, 'image/png'); // You can change format if needed
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan EMI Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">Loan EMI Calculator</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Loan EMI Calculator Functionality</h5>
                <div class="mb-3">
                    <label for="loanAmount" class="form-label">Loan Amount (P):</label>
                    <input type="number" class="form-control" id="loanAmount" placeholder="e.g., 100000">
                </div>
                <div class="mb-3">
                    <label for="interestRate" class="form-label">Annual Interest Rate (R in %):</label>
                    <input type="number" class="form-control" id="interestRate" placeholder="e.g., 8.5">
                </div>
                <div class="mb-3">
                    <label for="loanTerm" class="form-label">Loan Term (N in years):</label>
                    <input type="number" class="form-control" id="loanTerm" placeholder="e.g., 5">
                </div>
                <div class="d-grid gap-2 d-md-block mb-3">
                    <button class="btn btn-primary me-2" id="calculateBtn"><i class="fas fa-calculator"></i> Calculate EMI</button>
                    <button class="btn btn-danger" id="clearBtn"><i class="fas fa-trash"></i> Clear</button>
                </div>
                <div class="mt-4">
                    <h5>Monthly EMI:</h5>
                    <div class="input-group">
                        <input type="text" class="form-control" id="emiResult" readonly>
                        <button class="btn btn-info" id="copyBtn"><i class="fas fa-copy"></i> Copy</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const loanAmountInput = document.getElementById('loanAmount');
            const interestRateInput = document.getElementById('interestRate');
            const loanTermInput = document.getElementById('loanTerm');
            const calculateBtn = document.getElementById('calculateBtn');
            const clearBtn = document.getElementById('clearBtn');
            const emiResultInput = document.getElementById('emiResult');
            const copyBtn = document.getElementById('copyBtn');

            calculateBtn.addEventListener('click', () => {
                const P = parseFloat(loanAmountInput.value);
                const R_annual = parseFloat(interestRateInput.value);
                const N = parseFloat(loanTermInput.value);

                if (isNaN(P) || isNaN(R_annual) || isNaN(N) || P <= 0 || R_annual < 0 || N <= 0) {
                    emiResultInput.value = 'Please enter valid positive numbers for all fields.';
                    return;
                }

                const R_monthly = R_annual / (12 * 100); // Monthly interest rate
                const N_months = N * 12; // Total number of months

                let emi;
                if (R_monthly === 0) {
                    emi = P / N_months;
                } else {
                    emi = P * R_monthly * Math.pow(1 + R_monthly, N_months) / (Math.pow(1 + R_monthly, N_months) - 1);
                }

                emiResultInput.value = `₹${emi.toFixed(2)}`;
            });

            copyBtn.addEventListener('click', () => {
                emiResultInput.select();
                emiResultInput.setSelectionRange(0, 99999);
                document.execCommand('copy');
                alert('Copied to clipboard!');
            });

            clearBtn.addEventListener('click', () => {
                loanAmountInput.value = '';
                interestRateInput.value = '';
                loanTermInput.value = '';
                emiResultInput.value = '';
            });
        });
    </script>
</body>
</html>

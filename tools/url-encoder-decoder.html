<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Encoder & Decoder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">URL Encoder & Decoder</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">URL Encoder & Decoder Functionality</h5>
                <div class="mb-3">
                    <label for="textInput" class="form-label">Enter Text or URL:</label>
                    <textarea class="form-control" id="textInput" rows="5" placeholder="Type or paste text/URL here..."></textarea>
                </div>
                <div class="d-grid gap-2 d-md-block mb-3">
                    <button class="btn btn-primary" id="encodeBtn">Encode URL</button>
                    <button class="btn btn-primary" id="decodeBtn">Decode URL</button>
                </div>
                <div class="mt-3">
                    <label for="output" class="form-label">Output:</label>
                    <textarea class="form-control" id="output" rows="5" readonly></textarea>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const textInput = document.getElementById('textInput');
            const output = document.getElementById('output');
            const encodeBtn = document.getElementById('encodeBtn');
            const decodeBtn = document.getElementById('decodeBtn');

            encodeBtn.addEventListener('click', () => {
                try {
                    output.value = encodeURIComponent(textInput.value);
                } catch (e) {
                    alert('Encoding failed: ' + e.message);
                }
            });

            decodeBtn.addEventListener('click', () => {
                try {
                    output.value = decodeURIComponent(textInput.value);
                } catch (e) {
                    alert('Decoding failed: ' + e.message);
                }
            });
        });
    </script>
</body>
</html>

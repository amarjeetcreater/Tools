<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Cropper</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">Image Cropper</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Image Cropper Functionality</h5>
                <input type="file" class="form-control" id="imageUpload" accept="image/*">
                <div class="mt-3">
                    <img id="imagePreview" src="#" alt="Image Preview" style="max-width: 100%; display: none;">
                    <canvas id="imageCanvas" style="display: none; border: 1px solid #ccc;"></canvas>
                </div>
                <div class="mt-3">
                    <label for="xInput" class="form-label">X:</label>
                    <input type="number" class="form-control" id="xInput" value="0">
                </div>
                <div class="mt-3">
                    <label for="yInput" class="form-label">Y:</label>
                    <input type="number" class="form-control" id="yInput" value="0">
                </div>
                <div class="mt-3">
                    <label for="cropWidthInput" class="form-label">Width:</label>
                    <input type="number" class="form-control" id="cropWidthInput" value="100">
                </div>
                <div class="mt-3">
                    <label for="cropHeightInput" class="form-label">Height:</label>
                    <input type="number" class="form-control" id="cropHeightInput" value="100">
                </div>
                <button class="btn btn-primary mt-3" id="cropBtn">Crop Image</button>
                <div class="mt-3" id="downloadLink" style="display:none;">
                    <a href="#" id="downloadAnchor" download="cropped-image.png" class="btn btn-success">Download Cropped Image</a>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const imageUpload = document.getElementById('imageUpload');
            const imagePreview = document.getElementById('imagePreview');
            const imageCanvas = document.getElementById('imageCanvas');
            const ctx = imageCanvas.getContext('2d');
            const xInput = document.getElementById('xInput');
            const yInput = document.getElementById('yInput');
            const cropWidthInput = document.getElementById('cropWidthInput');
            const cropHeightInput = document.getElementById('cropHeightInput');
            const cropBtn = document.getElementById('cropBtn');
            const downloadLink = document.getElementById('downloadLink');
            const downloadAnchor = document.getElementById('downloadAnchor');

            let originalImage = null;

            imageUpload.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        originalImage = new Image();
                        originalImage.onload = function() {
                            imagePreview.src = originalImage.src;
                            imagePreview.style.display = 'block';
                            imageCanvas.style.display = 'none';
                            // Set default crop dimensions to image size if not set
                            if (cropWidthInput.value === '100' && cropHeightInput.value === '100') {
                                cropWidthInput.value = originalImage.width;
                                cropHeightInput.value = originalImage.height;
                            }
                        };
                        originalImage.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            });

            cropBtn.addEventListener('click', function() {
                if (!originalImage) {
                    alert('Please upload an image first.');
                    return;
                }

                const x = parseInt(xInput.value);
                const y = parseInt(yInput.value);
                const width = parseInt(cropWidthInput.value);
                const height = parseInt(cropHeightInput.value);

                if (isNaN(x) || isNaN(y) || isNaN(width) || isNaN(height) || width <= 0 || height <= 0) {
                    alert('Please enter valid crop dimensions and position.');
                    return;
                }

                imageCanvas.width = width;
                imageCanvas.height = height;
                ctx.drawImage(originalImage, x, y, width, height, 0, 0, width, height);

                imageCanvas.toBlob(function(blob) {
                    const url = URL.createObjectURL(blob);
                    downloadAnchor.href = url;
                    downloadLink.style.display = 'block';
                    imagePreview.style.display = 'none';
                    imageCanvas.style.display = 'block';
                }, 'image/png'); // You can change format if needed
            });
        });
    </script>
</body>
</html>

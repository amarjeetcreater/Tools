<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Minifier</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">JavaScript Minifier</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">JavaScript Minifier Functionality</h5>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="jsInput" class="form-label">Enter JavaScript:</label>
                        <textarea class="form-control" id="jsInput" rows="15" placeholder="Type or paste your JavaScript here..."></textarea>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="minifiedJsOutput" class="form-label">Minified JavaScript:</label>
                        <textarea class="form-control" id="minifiedJsOutput" rows="15" readonly></textarea>
                    </div>
                </div>
                <div class="d-flex justify-content-center gap-2 mt-3">
                    <button class="btn btn-primary" id="minifyBtn"><i class="fas fa-compress-alt"></i> Minify</button>
                    <button class="btn btn-secondary" id="copyBtn"><i class="fas fa-copy"></i> Copy Minified</button>
                    <button class="btn btn-info" id="downloadBtn"><i class="fas fa-download"></i> Download Minified</button>
                    <button class="btn btn-danger" id="clearBtn"><i class="fas fa-times"></i> Clear All</button>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/uglify-js/3.14.2/uglify-es.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const jsInput = document.getElementById('jsInput');
            const minifiedJsOutput = document.getElementById('minifiedJsOutput');
            const minifyBtn = document.getElementById('minifyBtn');
            const copyBtn = document.getElementById('copyBtn');
            const downloadBtn = document.getElementById('downloadBtn');
            const clearBtn = document.getElementById('clearBtn');

            const minifyCode = () => {
                const jsCode = jsInput.value;
                try {
                    const result = UglifyJS.minify(jsCode);
                    if (result.error) {
                        alert('Minification Error: ' + result.error.message);
                        minifiedJsOutput.value = '';
                    } else {
                        minifiedJsOutput.value = result.code;
                    }
                } catch (e) {
                    alert('An unexpected error occurred during minification: ' + e.message);
                    minifiedJsOutput.value = '';
                }
            };

            minifyBtn.addEventListener('click', minifyCode);

            jsInput.addEventListener('input', minifyCode);

            copyBtn.addEventListener('click', () => {
                minifiedJsOutput.select();
                minifiedJsOutput.setSelectionRange(0, 99999); // For mobile devices
                document.execCommand('copy');
                alert('Minified JavaScript copied to clipboard!');
            });

            downloadBtn.addEventListener('click', () => {
                const minifiedCode = minifiedJsOutput.value;
                if (minifiedCode) {
                    const blob = new Blob([minifiedCode], { type: 'text/javascript' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'minified.js';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                } else {
                    alert('No minified JavaScript to download.');
                }
            });

            clearBtn.addEventListener('click', () => {
                jsInput.value = '';
                minifiedJsOutput.value = '';
            });
        });
    </script>
</body>
</html>

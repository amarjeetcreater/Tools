<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robots.txt Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">Robots.txt Generator</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Robots.txt Generator Functionality</h5>
                <p class="card-text">Generate a robots.txt file to control how search engine crawlers interact with your website.</p>
                <div class="mb-3">
                    <label for="userAgentInput" class="form-label">User-agent (e.g., *, Googlebot)</label>
                    <input type="text" class="form-control" id="userAgentInput" value="*">
                </div>
                <div class="mb-3">
                    <label for="disallowInput" class="form-label">Disallow (one path per line, e.g., /private/)</label>
                    <textarea class="form-control" id="disallowInput" rows="5"></textarea>
                </div>
                <div class="mb-3">
                    <label for="allowInput" class="form-label">Allow (one path per line, e.g., /public/)</label>
                    <textarea class="form-control" id="allowInput" rows="5"></textarea>
                </div>
                <div class="mb-3">
                    <label for="sitemapUrlInput" class="form-label">Sitemap URL (optional)</label>
                    <input type="url" class="form-control" id="sitemapUrlInput" placeholder="e.g., https://www.example.com/sitemap.xml">
                </div>
                <button id="generateRobotsTxtBtn" class="btn btn-primary">Generate Robots.txt</button>
                <div class="mt-4">
                    <label for="robotsTxtOutput" class="form-label">Generated Robots.txt</label>
                    <textarea class="form-control" id="robotsTxtOutput" rows="10" readonly></textarea>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        // JavaScript for Robots.txt Generator tool
        document.addEventListener('DOMContentLoaded', function() {
            const userAgentInput = document.getElementById('userAgentInput');
            const disallowInput = document.getElementById('disallowInput');
            const allowInput = document.getElementById('allowInput');
            const sitemapUrlInput = document.getElementById('sitemapUrlInput');
            const generateRobotsTxtBtn = document.getElementById('generateRobotsTxtBtn');
            const robotsTxtOutput = document.getElementById('robotsTxtOutput');

            generateRobotsTxtBtn.addEventListener('click', generateRobotsTxt);

            function generateRobotsTxt() {
                let robotsTxtContent = '';

                const userAgent = userAgentInput.value.trim();
                if (userAgent) {
                    robotsTxtContent += `User-agent: ${userAgent}\n`;
                }

                const disallowPaths = disallowInput.value.split('\n').map(path => path.trim()).filter(path => path !== '');
                disallowPaths.forEach(path => {
                    robotsTxtContent += `Disallow: ${path}\n`;
                });

                const allowPaths = allowInput.value.split('\n').map(path => path.trim()).filter(path => path !== '');
                allowPaths.forEach(path => {
                    robotsTxtContent += `Allow: ${path}\n`;
                });

                const sitemapUrl = sitemapUrlInput.value.trim();
                if (sitemapUrl) {
                    robotsTxtContent += `Sitemap: ${sitemapUrl}\n`;
                }

                robotsTxtOutput.value = robotsTxtContent;
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcode Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">Barcode Generator</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Barcode Generator Functionality</h5>
                <p class="card-text">Enter text or numbers to generate a barcode.</p>
                <div class="mb-3">
                    <label for="barcodeText" class="form-label">Text/Number for Barcode</label>
                    <input type="text" class="form-control" id="barcodeText" placeholder="Enter text or numbers">
                </div>
                <div class="mb-3">
                    <label for="barcodeType" class="form-label">Barcode Type</label>
                    <select class="form-select" id="barcodeType">
                        <option value="CODE128">CODE128</option>
                        <option value="CODE39">CODE39</option>
                        <option value="EAN13">EAN13</option>
                        <option value="UPC">UPC</option>
                        <option value="ITF14">ITF14</option>
                        <option value="MSI">MSI</option>
                        <option value="pharmacode">Pharmacode</option>
                    </select>
                </div>
                <div class="d-grid gap-2 mb-3">
                    <button class="btn btn-primary" id="generateBarcodeBtn">Generate Barcode</button>
                    <button class="btn btn-secondary" id="clearBtn">Clear</button>
                </div>
                <div id="barcodeResult" class="mt-4 text-center">
                    <h5>Generated Barcode:</h5>
                    <canvas id="barcodeCanvas"></canvas>
                    <div class="mt-3">
                        <button class="btn btn-success" id="downloadBarcodeBtn" style="display: none;">Download Barcode</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        // JavaScript for Barcode Generator tool
        document.addEventListener('DOMContentLoaded', function() {
            const barcodeTextInput = document.getElementById('barcodeText');
            const barcodeTypeSelect = document.getElementById('barcodeType');
            const generateBarcodeBtn = document.getElementById('generateBarcodeBtn');
            const clearBtn = document.getElementById('clearBtn');
            const barcodeCanvas = document.getElementById('barcodeCanvas');
            const downloadBarcodeBtn = document.getElementById('downloadBarcodeBtn');

            generateBarcodeBtn.addEventListener('click', generateBarcode);
            clearBtn.addEventListener('click', clearFields);
            downloadBarcodeBtn.addEventListener('click', downloadBarcode);

            function generateBarcode() {
                const text = barcodeTextInput.value.trim();
                const type = barcodeTypeSelect.value;

                if (!text) {
                    alert('Please enter text or numbers to generate a barcode.');
                    return;
                }

                try {
                    JsBarcode(barcodeCanvas, text, {
                        format: type,
                        displayValue: true,
                        width: 2,
                        height: 100,
                        margin: 10
                    });
                    downloadBarcodeBtn.style.display = 'block';
                } catch (error) {
                    alert('Error generating barcode. Please check your input or selected type.');
                    console.error('Barcode generation error:', error);
                    downloadBarcodeBtn.style.display = 'none';
                }
            }

            function downloadBarcode() {
                const dataURL = barcodeCanvas.toDataURL('image/png');
                const a = document.createElement('a');
                a.href = dataURL;
                a.download = 'barcode.png';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }

            function clearFields() {
                barcodeTextInput.value = '';
                barcodeCanvas.innerHTML = '';
                downloadBarcodeBtn.style.display = 'none';
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">Tip Calculator</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Tip Calculator Functionality</h5>
                <div class="mb-3">
                    <label for="billAmount" class="form-label">Bill Amount ($):</label>
                    <input type="number" class="form-control" id="billAmount" placeholder="Enter bill amount">
                </div>
                <div class="mb-3">
                    <label for="tipPercentage" class="form-label">Tip Percentage (%):</label>
                    <input type="range" class="form-range" id="tipPercentage" min="0" max="100" value="15">
                    <span id="tipPercentageValue" class="badge bg-primary">15%</span>
                </div>
                <div class="mb-3">
                    <label for="numPeople" class="form-label">Number of People:</label>
                    <input type="number" class="form-control" id="numPeople" placeholder="Enter number of people" value="1" min="1">
                </div>
                <div class="d-grid gap-2 d-md-block mb-3">
                    <button class="btn btn-primary me-2" id="calculateBtn"><i class="fas fa-calculator"></i> Calculate</button>
                    <button class="btn btn-danger" id="clearBtn"><i class="fas fa-trash"></i> Clear</button>
                </div>
                <div class="mt-4">
                    <h5>Tip Amount:</h5>
                    <div class="input-group mb-3">
                        <input type="text" class="form-control" id="tipAmount" readonly>
                        <button class="btn btn-info" id="copyTipBtn"><i class="fas fa-copy"></i> Copy</button>
                    </div>
                    <h5>Total Bill:</h5>
                    <div class="input-group mb-3">
                        <input type="text" class="form-control" id="totalBill" readonly>
                        <button class="btn btn-info" id="copyTotalBtn"><i class="fas fa-copy"></i> Copy</button>
                    </div>
                    <h5>Amount Per Person:</h5>
                    <div class="input-group">
                        <input type="text" class="form-control" id="amountPerPerson" readonly>
                        <button class="btn btn-info" id="copyPerPersonBtn"><i class="fas fa-copy"></i> Copy</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const billAmountInput = document.getElementById('billAmount');
            const tipPercentageInput = document.getElementById('tipPercentage');
            const tipPercentageValueSpan = document.getElementById('tipPercentageValue');
            const numPeopleInput = document.getElementById('numPeople');
            const calculateBtn = document.getElementById('calculateBtn');
            const clearBtn = document.getElementById('clearBtn');
            const tipAmountInput = document.getElementById('tipAmount');
            const totalBillInput = document.getElementById('totalBill');
            const amountPerPersonInput = document.getElementById('amountPerPerson');
            const copyTipBtn = document.getElementById('copyTipBtn');
            const copyTotalBtn = document.getElementById('copyTotalBtn');
            const copyPerPersonBtn = document.getElementById('copyPerPersonBtn');

            tipPercentageInput.addEventListener('input', () => {
                tipPercentageValueSpan.textContent = `${tipPercentageInput.value}%`;
            });

            function calculateTip() {
                const billAmount = parseFloat(billAmountInput.value);
                const tipPercentage = parseFloat(tipPercentageInput.value);
                const numPeople = parseInt(numPeopleInput.value);

                if (isNaN(billAmount) || billAmount <= 0) {
                    tipAmountInput.value = 'Invalid Bill Amount';
                    totalBillInput.value = '';
                    amountPerPersonInput.value = '';
                    return;
                }

                if (isNaN(numPeople) || numPeople <= 0) {
                    tipAmountInput.value = 'Invalid Number of People';
                    totalBillInput.value = '';
                    amountPerPersonInput.value = '';
                    return;
                }

                const tipAmount = billAmount * (tipPercentage / 100);
                const totalBill = billAmount + tipAmount;
                const amountPerPerson = totalBill / numPeople;

                tipAmountInput.value = tipAmount.toFixed(2);
                totalBillInput.value = totalBill.toFixed(2);
                amountPerPersonInput.value = amountPerPerson.toFixed(2);
            }

            calculateBtn.addEventListener('click', calculateTip);

            clearBtn.addEventListener('click', () => {
                billAmountInput.value = '';
                tipPercentageInput.value = '15';
                tipPercentageValueSpan.textContent = '15%';
                numPeopleInput.value = '1';
                tipAmountInput.value = '';
                totalBillInput.value = '';
                amountPerPersonInput.value = '';
            });

            function copyToClipboard(element) {
                element.select();
                element.setSelectionRange(0, 99999);
                document.execCommand('copy');
                alert('Copied to clipboard!');
            }

            copyTipBtn.addEventListener('click', () => copyToClipboard(tipAmountInput));
            copyTotalBtn.addEventListener('click', () => copyToClipboard(totalBillInput));
            copyPerPersonBtn.addEventListener('click', () => copyToClipboard(amountPerPersonInput));
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Address Lookup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">IP Address Lookup</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">IP Address Lookup Functionality</h5>
                <div class="mb-3">
                    <label for="ipInput" class="form-label">Enter IP Address (or leave blank for your IP):</label>
                    <input type="text" class="form-control" id="ipInput" placeholder="e.g., 8.8.8.8 or example.com">
                </div>
                <div class="d-grid gap-2 d-md-block mb-3">
                    <button class="btn btn-primary me-2" id="lookupBtn"><i class="fas fa-search"></i> Lookup IP</button>
                    <button class="btn btn-danger" id="clearBtn"><i class="fas fa-trash"></i> Clear</button>
                </div>
                <div id="results" class="mt-4">
                    <h5>Lookup Results:</h5>
                    <pre id="output" class="bg-light p-3 rounded"></pre>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const ipInput = document.getElementById('ipInput');
            const lookupBtn = document.getElementById('lookupBtn');
            const clearBtn = document.getElementById('clearBtn');
            const output = document.getElementById('output');

            lookupBtn.addEventListener('click', async () => {
                const ipAddress = ipInput.value.trim();
                const apiUrl = ipAddress ? `http://ip-api.com/json/${ipAddress}` : 'http://ip-api.com/json/';

                try {
                    const response = await fetch(apiUrl);
                    const data = await response.json();

                    if (data.status === 'success') {
                        output.textContent = JSON.stringify(data, null, 2);
                    } else {
                        output.textContent = `Error: ${data.message || 'Could not retrieve IP information.'}`;
                    }
                } catch (error) {
                    output.textContent = `An error occurred: ${error.message}`;
                }
            });

            clearBtn.addEventListener('click', () => {
                ipInput.value = '';
                output.textContent = '';
            });
        });
    </script>
</body>
</html>

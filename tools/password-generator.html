<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">Password Generator</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Password Generator Functionality</h5>
                <div class="mb-3">
                    <label for="lengthInput" class="form-label">Password Length:</label>
                    <input type="number" class="form-control" id="lengthInput" value="12" min="4" max="64">
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="uppercaseCheck" checked>
                    <label class="form-check-label" for="uppercaseCheck">Include Uppercase Letters</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="lowercaseCheck" checked>
                    <label class="form-check-label" for="lowercaseCheck">Include Lowercase Letters</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="numbersCheck" checked>
                    <label class="form-check-label" for="numbersCheck">Include Numbers</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="symbolsCheck">
                    <label class="form-check-label" for="symbolsCheck">Include Symbols</label>
                </div>
                <button class="btn btn-primary mt-3" id="generateBtn">Generate Password</button>
                <div class="mt-3">
                    <label for="passwordOutput" class="form-label">Generated Password:</label>
                    <div class="input-group">
                        <input type="text" class="form-control" id="passwordOutput" readonly>
                        <button class="btn btn-outline-secondary" type="button" id="copyBtn">Copy</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const lengthInput = document.getElementById('lengthInput');
            const uppercaseCheck = document.getElementById('uppercaseCheck');
            const lowercaseCheck = document.getElementById('lowercaseCheck');
            const numbersCheck = document.getElementById('numbersCheck');
            const symbolsCheck = document.getElementById('symbolsCheck');
            const generateBtn = document.getElementById('generateBtn');
            const passwordOutput = document.getElementById('passwordOutput');
            const copyBtn = document.getElementById('copyBtn');

            const generatePassword = () => {
                const length = parseInt(lengthInput.value);
                let charset = '';
                let password = '';

                if (uppercaseCheck.checked) charset += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
                if (lowercaseCheck.checked) charset += 'abcdefghijklmnopqrstuvwxyz';
                if (numbersCheck.checked) charset += '0123456789';
                if (symbolsCheck.checked) charset += '!@#$%^&*()_+-=[]{}|;:,.<>?';

                if (charset === '') {
                    alert('Please select at least one character type.');
                    return '';
                }

                for (let i = 0; i < length; i++) {
                    password += charset.charAt(Math.floor(Math.random() * charset.length));
                }
                return password;
            };

            generateBtn.addEventListener('click', () => {
                passwordOutput.value = generatePassword();
            });

            copyBtn.addEventListener('click', () => {
                passwordOutput.select();
                passwordOutput.setSelectionRange(0, 99999); // For mobile devices
                document.execCommand('copy');
                alert('Password copied to clipboard!');
            });

            // Generate a password on load
            passwordOutput.value = generatePassword();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 Encoder & Decoder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">Base64 Encoder & Decoder</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Base64 Encoder & Decoder Functionality</h5>
                <div class="mb-3">
                    <label for="textInput" class="form-label">Enter Text:</label>
                    <textarea class="form-control" id="textInput" rows="5" placeholder="Type or paste text here..."></textarea>
                </div>
                <div class="d-grid gap-2 d-md-block mb-3">
                    <button class="btn btn-primary me-2" id="encodeBtn"><i class="fas fa-lock"></i> Encode to Base64</button>
                    <button class="btn btn-primary me-2" id="decodeBtn"><i class="fas fa-unlock"></i> Decode from Base64</button>
                    <button class="btn btn-info me-2" id="copyBtn"><i class="fas fa-copy"></i> Copy Encoded/Decoded</button>
                    <button class="btn btn-danger" id="clearBtn"><i class="fas fa-trash"></i> Clear All</button>
                </div>
                <div class="mt-3">
                    <label for="output" class="form-label">Output:</label>
                    <textarea class="form-control" id="output" rows="5" readonly></textarea>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const textInput = document.getElementById('textInput');
            const output = document.getElementById('output');
            const encodeBtn = document.getElementById('encodeBtn');
            const decodeBtn = document.getElementById('decodeBtn');
            const copyBtn = document.getElementById('copyBtn');
            const clearBtn = document.getElementById('clearBtn');

            encodeBtn.addEventListener('click', () => {
                try {
                    output.value = btoa(textInput.value);
                } catch (e) {
                    alert('Encoding failed: ' + e.message);
                }
            });

            decodeBtn.addEventListener('click', () => {
                try {
                    output.value = atob(textInput.value);
                } catch (e) {
                    alert('Decoding failed: ' + e.message);
                }
            });

            copyBtn.addEventListener('click', () => {
                output.select();
                output.setSelectionRange(0, 99999);
                document.execCommand('copy');
                alert('Copied to clipboard!');
            });

            clearBtn.addEventListener('click', () => {
                textInput.value = '';
                output.value = '';
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Photo Downloader</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">Instagram Photo Downloader</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Instagram Photo Downloader Functionality</h5>
                <p class="card-text">This is a placeholder for the Instagram Photo Downloader tool. Its functionality will be implemented here.</p>
                <div class="mb-3">
                    <label for="instagramUrl" class="form-label">Enter Instagram Post URL</label>
                    <input type="url" class="form-control" id="instagramUrl" placeholder="https://www.instagram.com/p/YOUR_POST_ID/">
                </div>
                <div class="d-grid gap-2 mb-3">
                    <button class="btn btn-primary" id="getPhotoBtn">Get Photo</button>
                    <button class="btn btn-secondary" id="clearBtn">Clear</button>
                </div>
                <div id="photoResult" class="mt-4 text-center">
                    <h5>Downloaded Photo:</h5>
                    <div id="photoDisplay" class="mb-3">
                        <!-- Photo will be displayed here -->
                    </div>
                    <div id="downloadOptions" style="display: none;">
                        <a id="downloadLink" href="#" class="btn btn-success" download>Download Photo</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        // JavaScript for Instagram Photo Downloader tool
        document.addEventListener('DOMContentLoaded', function() {
            const instagramUrlInput = document.getElementById('instagramUrl');
            const getPhotoBtn = document.getElementById('getPhotoBtn');
            const clearBtn = document.getElementById('clearBtn');
            const photoDisplay = document.getElementById('photoDisplay');
            const downloadOptions = document.getElementById('downloadOptions');
            const downloadLink = document.getElementById('downloadLink');

            getPhotoBtn.addEventListener('click', getInstagramPhoto);
            clearBtn.addEventListener('click', clearFields);

            async function getInstagramPhoto() {
                const url = instagramUrlInput.value.trim();
                if (!url) {
                    photoDisplay.innerHTML = '<p class="text-danger">Please enter an Instagram post URL.</p>';
                    downloadOptions.style.display = 'none';
                    return;
                }

                photoDisplay.innerHTML = '<p>Loading...</p>';
                downloadOptions.style.display = 'none';

                try {
                    // Using a proxy to bypass CORS issues for fetching Instagram data
                    // Note: This API might not always be reliable or may require an API key for consistent use.
                    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url + '?__a=1')}`;
                    const response = await fetch(proxyUrl);
                    const data = await response.json();

                    let imageUrl = '';
                    if (data.graphql && data.graphql.shortcode_media) {
                        if (data.graphql.shortcode_media.is_video) {
                            photoDisplay.innerHTML = '<p class="text-danger">This is a video post. Please use a video downloader.</p>';
                            return;
                        } else if (data.graphql.shortcode_media.edge_sidecar_to_children) {
                            // Handle multiple images (carousel post)
                            imageUrl = data.graphql.shortcode_media.edge_sidecar_to_children.edges[0].node.display_resources[data.graphql.shortcode_media.edge_sidecar_to_children.edges[0].node.display_resources.length - 1].src;
                        } else {
                            // Single image post
                            imageUrl = data.graphql.shortcode_media.display_resources[data.graphql.shortcode_media.display_resources.length - 1].src;
                        }
                    } else if (data.entry_data && data.entry_data.PostPage && data.entry_data.PostPage[0].graphql.shortcode_media) {
                        if (data.entry_data.PostPage[0].graphql.shortcode_media.is_video) {
                            photoDisplay.innerHTML = '<p class="text-danger">This is a video post. Please use a video downloader.</p>';
                            return;
                        } else if (data.entry_data.PostPage[0].graphql.shortcode_media.edge_sidecar_to_children) {
                            imageUrl = data.entry_data.PostPage[0].graphql.shortcode_media.edge_sidecar_to_children.edges[0].node.display_resources[data.entry_data.PostPage[0].graphql.shortcode_media.edge_sidecar_to_children.edges[0].node.display_resources.length - 1].src;
                        } else {
                            imageUrl = data.entry_data.PostPage[0].graphql.shortcode_media.display_resources[data.entry_data.PostPage[0].graphql.shortcode_media.display_resources.length - 1].src;
                        }
                    } else {
                        photoDisplay.innerHTML = '<p class="text-danger">Could not find photo. Invalid URL or private post.</p>';
                        return;
                    }

                    if (imageUrl) {
                        photoDisplay.innerHTML = `<img src="${imageUrl}" alt="Instagram Photo" class="img-fluid rounded shadow-sm mb-3">`;
                        downloadLink.href = imageUrl;
                        downloadOptions.style.display = 'block';
                    } else {
                        photoDisplay.innerHTML = '<p class="text-danger">Could not extract photo URL.</p>';
                    }

                } catch (error) {
                    console.error('Error fetching Instagram photo:', error);
                    photoDisplay.innerHTML = '<p class="text-danger">Error fetching photo. Please check the URL or try again later.</p>';
                }
            }

            function clearFields() {
                instagramUrlInput.value = '';
                photoDisplay.innerHTML = '';
                downloadOptions.style.display = 'none';
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Minifier</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <h1 class="text-center mb-4">CSS Minifier</h1>
        <div class="ad-section">
            <!-- Ad Space -->
            <p>Advertisement</p>
        </div>
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">CSS Minifier Functionality</h5>
                <div class="mb-3">
                    <label for="cssInput" class="form-label">Enter CSS:</label>
                    <textarea class="form-control" id="cssInput" rows="10" placeholder="Type or paste your CSS here..."></textarea>
                </div>
                <button class="btn btn-primary mt-3" id="minifyBtn">Minify CSS</button>
                <div class="mt-3">
                    <label for="minifiedCssOutput" class="form-label">Minified CSS:</label>
                    <textarea class="form-control" id="minifiedCssOutput" rows="10" readonly></textarea>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/loadComponents.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const cssInput = document.getElementById('cssInput');
            const minifiedCssOutput = document.getElementById('minifiedCssOutput');
            const minifyBtn = document.getElementById('minifyBtn');

            minifyBtn.addEventListener('click', () => {
                const css = cssInput.value;
                // Simple minification: remove comments, newlines, and extra spaces
                let minifiedCss = css.replace(/\/\*[^*]*\*+(?:[^/*][^*]*\*+)*\//g, ''); // Remove comments
                minifiedCss = minifiedCss.replace(/\s*([{}|:;,])\s*/g, '$1'); // Remove spaces around braces, colons, semicolons, commas
                minifiedCss = minifiedCss.replace(/;}/g, '}'); // Remove semicolon before closing brace
                minifiedCss = minifiedCss.replace(/\s+/g, ' '); // Replace multiple spaces with single space
                minifiedCss = minifiedCss.trim(); // Trim leading/trailing spaces

                minifiedCssOutput.value = minifiedCss;
            });

            // Optional: Minify on input change
            cssInput.addEventListener('input', () => {
                const css = cssInput.value;
                let minifiedCss = css.replace(/\/\*[^*]*\*+(?:[^/*][^*]*\*+)*\//g, '');
                minifiedCss = minifiedCss.replace(/\s*([{}|:;,])\s*/g, '$1');
                minifiedCss = minifiedCss.replace(/;}/g, '}');
                minifiedCss = minifiedCss.replace(/\s+/g, ' ');
                minifiedCss = minifiedCss.trim();
                minifiedCssOutput.value = minifiedCss;
            });
        });
    </script>
</body>
</html>

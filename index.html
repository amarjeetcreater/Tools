<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Tools Website</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-4">
        <div class="p-5 mb-4 bg-light rounded-3">
            <div class="container-fluid py-5">
                <h1 class="display-5 fw-bold">Welcome to Multi-Tools Website!</h1>
                <p class="col-md-8 fs-4">Your one-stop destination for a wide array of useful online tools. From image manipulation to text utilities, and developer tools to calculators, we have everything you need to boost your productivity.</p>
                <button class="btn btn-primary btn-lg" type="button" onclick="document.getElementById('tools-list').scrollIntoView({ behavior: 'smooth' });">Explore Tools</button>
            </div>
        </div>
        <h2 class="text-center mb-4">Our Tools</h2>
        <div class="row mb-4">
            <div class="col-md-8 offset-md-2">
                <input type="text" class="form-control" id="toolSearch" placeholder="Search for tools...">
            </div>
        </div>
        <div id="tools-list" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
            <!-- Tools will be loaded here by JavaScript -->
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/loadComponents.js"></script>
</body>
</html>
